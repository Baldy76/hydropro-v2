<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v22.5</title>
    <link rel="stylesheet" href="styles.css?v=225">
</head>
<body class="light-mode">

    <div class="mode-switch-wrapper">
        <label class="ios-switch">
            <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
            <span class="slider"></span>
        </label>
    </div>

    <header id="branding-shield">
        <img src="Logo.png" class="logo-img" alt="Hydro Pro">
        <div class="home-hero">
            <div id="greetingMsg" class="home-greeting-ironclad">GOOD MORNING, PARTNER! ☕</div>
            <div id="headerDate" class="home-date-ironclad"></div>
        </div>
    </header>

    <div id="globalNav" class="subpage-nav hidden">
        <button class="back-pill-ironclad" onclick="openTab('home')">🏠 Back to Home</button>
    </div>

    <div id="actionModal" class="modal-overlay hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalCustomerName" class="modal-title-locked"></div>
            <p id="modalCustomerAddress" class="modal-sub-locked"></p>
            <div class="modal-action-grid">
                <button class="modal-btn btn-edit" id="modalEditBtn">✏️ Edit Details</button>
                <button class="modal-btn btn-cancel" onclick="closeModal()">❌ Return to List</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div id="master" class="tab-content">
            <div class="search-shield">
                <input type="text" id="mainSearch" class="search-input-pill" placeholder="🔍 Search customers..." oninput="renderMasterTable()">
            </div>
            
            <div id="masterTableBody" class="iron-spaced-stack"></div>

            <div class="fixed-bottom-shield">
                <div class="action-card-green">
                    <button class="btn-clear-large" onclick="completeCycle()">🚀 START NEW MONTH</button>
                </div>
            </div>
        </div>

        <div id="home" class="tab-content active">
            <div class="home-grid-ironclad">
                <button class="tile tile-restore" onclick="openTab('admin')"><span>✨</span><small>Setup</small></button>
                <button class="tile tile-restore" onclick="openTab('master')"><span>👥</span><small>Custs</small></button>
                <button class="tile tile-restore" onclick="openTab('stats')"><span>📊</span><small>Stats</small></button>
                <button class="tile tile-restore" onclick="openTab('spend')"><span>💸</span><small>Ledger</small></button>
                <button class="tile tile-restore tile-weekly-hub" onclick="openTab('weeksHub')"><span>📅</span><small>Weekly Work</small></button>
            </div>
        </div>

        <div id="admin" class="tab-content"></div>
        <div id="weeksHub" class="tab-content"></div>
        <div id="week1" class="tab-content"></div><div id="week2" class="tab-content"></div><div id="week3" class="tab-content"></div><div id="week4" class="tab-content"></div><div id="week5" class="tab-content"></div>
        <div id="stats" class="tab-content"></div>
        <div id="spend" class="tab-content"></div>
    </div>

    <footer class="centered-version-footer">v22.5 - Master Page Restored</footer>

    <script src="app.js?v=225"></script>
</body>
</html>
