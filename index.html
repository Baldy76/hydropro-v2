<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v13.8</title>
    <link rel="stylesheet" href="styles.css?v=138">
</head>
<body class="light-mode">

    <div class="app-header" id="mainHeader">
        <img src="Logo.png" class="logo-img" alt="Logo">
        <div class="mode-switch-wrapper">
            <label class="ios-switch">
                <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="main-container">
        
        <div id="home" class="tab-content active">
            <div class="home-hero">
                <div id="greetingMsg" class="home-greeting">Hello, Jonathan!</div>
                <div id="headerDate" class="home-date"></div>
            </div>
            <div class="home-grid">
                <button class="tile tile-main" onclick="openTab('admin')"><span>✨</span><small>Setup</small></button>
                <button class="tile tile-main" onclick="openTab('master')"><span>👥</span><small>Custs</small></button>
                <button class="tile tile-main" onclick="openTab('stats')"><span>📊</span><small>Stats</small></button>
                <button class="tile tile-main" onclick="openTab('spend')"><span>💸</span><small>Ledger</small></button>
                <button class="tile tile-weeks-hub" onclick="openTab('weeksHub')"><span>📅</span><small>Weekly Work</small></button>
            </div>
        </div>

        <div id="weeksHub" class="tab-content">
            <button class="back-pill" onclick="openTab('home')">🏠 Back to Home</button>
            <div class="home-grid">
                <button class="tile tile-week" onclick="openTab('week1')"><span>1</span><small>Week 1</small></button>
                <button class="tile tile-week" onclick="openTab('week2')"><span>2</span><small>Week 2</small></button>
                <button class="tile tile-week" onclick="openTab('week3')"><span>3</span><small>Week 3</small></button>
                <button class="tile tile-week" onclick="openTab('week4')"><span>4</span><small>Week 4</small></button>
                <button class="tile tile-week" onclick="openTab('week5')"><span>5</span><small>Week 5</small></button>
            </div>
        </div>

        <div id="globalNav" class="tab-content" style="display:none;">
            <button class="back-pill" onclick="handleBackNavigation()">🏠 Back to Home</button>
        </div>

        <div id="admin" class="tab-content">
            <div class="card ios-form-card">
                <h3 class="section-title">✨ Add Client</h3>
                <input type="hidden" id="editId">
                <div class="input-group"><label class="ios-label">Name</label><input type="text" id="cName" class="ios-input"></div>
                <div class="input-group"><label class="ios-label">House No.</label><input type="text" id="cHouseNum" class="ios-input"></div>
                <div class="input-group"><label class="ios-label">Street</label><input type="text" id="cStreet" class="ios-input"></div>
                <div class="input-group"><label class="ios-label">Postcode</label><input type="text" id="cPostcode" class="ios-input"></div>
                <div class="input-group"><label class="ios-label">Mobile</label><input type="tel" id="cPhone" class="ios-input"></div>
                <div class="input-group"><label class="ios-label">Price £</label><input type="number" id="cPrice" class="ios-input"></div>
                <div class="grid-1x2">
                    <div class="input-group"><label class="ios-label">Week</label><select id="cWeek" class="ios-select"><option value="1">W1</option><option value="2">W2</option><option value="3">W3</option><option value="4">W4</option><option value="5">W5</option></select></div>
                    <div class="input-group"><label class="ios-label">Day</label><select id="cDay" class="ios-select"><option value="Monday">Mon</option><option value="Tuesday">Tue</option><option value="Wednesday">Wed</option><option value="Thursday">Thu</option><option value="Friday">Fri</option></select></div>
                </div>
                <div class="input-group"><label class="ios-label">Notes</label><textarea id="cNotes" class="ios-textarea"></textarea></div>
                <button class="btn-main full-width-btn bounce-on-tap" onclick="saveCustomer()">💾 Save Customer</button>
            </div>
            <div class="card action-card-green"><button class="btn-clear full-width-btn" onclick="completeCycle()">🚀 START NEW MONTH</button></div>
        </div>

        <div id="master" class="tab-content">
            <input type="text" id="mainSearch" class="search-input-pill" placeholder="🔍 Search..." oninput="renderMasterTable()">
            <div id="masterTableBody"></div>
        </div>

        <div id="stats" class="tab-content">
            <div class="dashboard-hero"><div id="currProfit" class="hero-amount">£0.00</div><small>NET PROFIT</small></div>
            <div id="monthlyHistoryContainer"></div>
        </div>

        <div id="spend" class="tab-content">
            <div class="card"><h3 class="section-title">💸 Ledger</h3><input type="text" id="expDesc" placeholder="Description" class="ios-input" style="background:var(--input-bg); padding:10px; border-radius:10px; margin-bottom:10px;"><input type="number" id="expAmt" placeholder="Amount £" class="ios-input" style="background:var(--input-bg); padding:10px; border-radius:10px;"><button class="btn-main full-width-btn" onclick="addExpense()" style="margin-top:10px;">Add Expense</button></div>
            <div id="expenseList"></div>
        </div>

        <div id="week1" class="tab-content"></div><div id="week2" class="tab-content"></div><div id="week3" class="tab-content"></div><div id="week4" class="tab-content"></div><div id="week5" class="tab-content"></div>
    </div>

    <div class="page-version-footer">v13.8 - Production Verified</div>
    <div id="globalModal" class="modal-overlay" onclick="if(event.target === this) closeModal()"><div class="modal-content"><button class="close-btn" onclick="closeModal()">✕</button><div id="modalContentBody"></div></div></div>

    <script src="app.js?v=138"></script>
</body>
</html>
