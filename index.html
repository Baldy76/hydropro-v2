<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v46.2</title>
    <link rel="stylesheet" href="styles.css?v=462">
</head>
<body class="light-mode">

    <header id="G-HEADER">
        <div class="G-LOGO-WRAP"><img src="Logo.png" id="mainLogo" alt="HydroPro"></div>
        <div class="CENTRAL-STATUS-POD">
            <div id="weather-pill" class="G-WEATHER-PILL" onclick="launchWeatherApp()">
                <span id="w-icon">🌤️</span><small id="w-text">SYNC...</small>
            </div>
            <div class="G-SWITCH-WRAP">
                <span class="MODE-LABEL">LIT</span>
                <label class="ios-switch">
                    <input type="checkbox" id="themeCheckbox">
                    <span class="ios-slider"></span>
                </label>
                <span class="MODE-LABEL">DRK</span>
            </div>
        </div>
        <div class="DATE-CONTAINER"><span id="dateText"></span></div>
    </header>

    <main id="G-VIEWPORT">
        <section id="home-root" class="tab-content active">
            <div class="HUB-grid">
                <div class="HUB-row">
                    <button class="HUB-btn" onclick="openTab('admin-root')"><span class="HUB-icon">⚙️</span><small class="HUB-label">Admin</small></button>
                    <button class="HUB-btn" onclick="openTab('master-root')"><span class="HUB-icon">👥</span><small class="HUB-label">Custs</small></button>
                </div>
                <div class="HUB-row">
                    <button class="HUB-btn" onclick="openTab('finances-root')"><span class="HUB-icon">💰</span><small class="HUB-label">Finances</small></button>
                    <button class="HUB-btn" onclick="openTab('weeks-root')"><span class="HUB-icon">📅</span><small class="HUB-label">Weeks</small></button>
                </div>
            </div>
            <div class="HUB-sync-area"><button class="HUB-sync-btn" onclick="location.reload(true)">🔄 SYNC UPDATES</button></div>
        </section>

        <section id="admin-root" class="tab-content">
            <button class="ADM-back-btn" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="ADM-vault">
                <h3 class="ADM-title">Quick Add Customer</h3>
                <div class="ADM-row"><span>👤</span><input type="text" id="cName" placeholder="Name"></div>
                <div class="ADM-row"><span>🏠</span><input type="text" id="cHouseNum" placeholder="No."></div>
                <div class="ADM-row"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street"></div>
                <div class="ADM-row"><span>💰</span><input type="number" id="cPrice" placeholder="Price £"></div>
                <button class="ADM-save-btn" onclick="saveCustomer()">✨ SAVE CUSTOMER</button>
            </div>
            <div class="ADM-vault">
                <h3 class="ADM-title">Bank Details</h3>
                <div class="ADM-row"><span>🏦</span><input type="text" id="bName" placeholder="Acc Name"></div>
                <div class="ADM-row"><span>💳</span><input type="text" id="bAcc" placeholder="Acc No."></div>
                <button class="ADM-save-btn" style="background:var(--accent);" onclick="saveBank()">🔒 SECURE BANK</button>
            </div>
        </section>

        <section id="master-root" class="tab-content">
            <button class="CST-back-btn" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="CST-search-vault">
                <input type="text" id="mainSearch" placeholder="🔍 Search..." oninput="renderMaster()">
            </div>
            <div id="master-list-container"></div>
        </section>

        <section id="finances-root" class="tab-content">
            <button class="FIN-back-btn" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div id="FIN-dashboard"></div>
            <div id="FIN-ledger"></div>
        </section>

        <section id="weeks-root" class="tab-content">
            <button class="WEE-back-btn" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="WEE-grid">
                <div class="WEE-row"><button class="WEE-btn" onclick="viewWeek(1)">1</button><button class="WEE-btn" onclick="viewWeek(2)">2</button></div>
                <div class="WEE-row"><button class="WEE-btn" onclick="viewWeek(3)">3</button><button class="WEE-btn" onclick="viewWeek(4)">4</button></div>
                <div class="WEE-row"><button class="WEE-btn full" onclick="viewWeek(5)">5</button></div>
            </div>
        </section>

        <section id="week-view-root" class="tab-content">
            <div class="WEE-nav">
                <button onclick="openTab('weeks-root')">⬅️ BACK</button>
                <button onclick="openTab('home-root')">🏠 HUB</button>
            </div>
            <div class="WEE-day-bar">
                <button class="WEE-day active" onclick="setWorkingDay('Mon', this)">M</button>
                <button class="WEE-day" onclick="setWorkingDay('Tue', this)">T</button>
                <button class="WEE-day" onclick="setWorkingDay('Wed', this)">W</button>
                <button class="WEE-day" onclick="setWorkingDay('Thu', this)">T</button>
                <button class="WEE-day" onclick="setWorkingDay('Fri', this)">F</button>
                <button class="WEE-day" onclick="setWorkingDay('Sat', this)">S</button>
                <button class="WEE-day" onclick="setWorkingDay('Sun', this)">S</button>
            </div>
            <div id="WEE-list"></div>
        </section>
    </main>

    <div id="briefingModal" class="modal-overlay hidden" onclick="closeBriefing()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="briefingData"></div>
            <button class="ADM-save-btn" onclick="closeBriefing()">CLOSE BRIEFING</button>
        </div>
    </div>

    <footer id="G-FOOTER">v46.2 IRON PARTITION</footer>
    <script src="app.js?v=462"></script>
</body>
</html>
