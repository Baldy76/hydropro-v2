<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v29.6</title>
    <link rel="stylesheet" href="styles.css?v=296">
</head>
<body class="light-mode">

    <header id="global-shield">
        <div class="header-top"><img src="Logo.png" class="oblong-logo" alt="Logo"><button id="themeToggleBtn" onclick="toggleDarkMode()">🌙</button></div>
        <div class="header-greet"><span id="greetText"></span><span id="dateText"></span></div>
    </header>

    <div id="app-viewport">
        <section id="home-root" class="tab-content active">
            <div class="home-grid">
                <button onclick="openTab('setup-root')"><span>✨</span><small>Setup</small></button>
                <button onclick="openTab('master-root')"><span>👥</span><small>Custs</small></button>
                <button onclick="openTab('stats-root')"><span>📊</span><small>Stats</small></button>
                <button onclick="openTab('ledger-root')"><span>💸</span><small>Ledger</small></button>
                <button class="full-tile" onclick="openTab('weeks-root')"><span>📅</span><small>Weekly Work</small></button>
            </div>
        </section>

        <section id="master-root" class="tab-content">
            <button class="nav-back" onclick="openTab('home-root')">🏠 Back to Home</button>
            <div class="search-box"><input type="text" id="mainSearch" placeholder="🔍 Search customers..." oninput="renderMaster()"></div>
            <div id="master-list-container"></div>
        </section>

        <section id="setup-root" class="tab-content">
            <button class="nav-back" onclick="openTab('home-root')">🏠 Back to Home</button>
            <div class="setup-card">
                <input type="hidden" id="editId">
                <div class="entry-row"><span>👤</span><input type="text" id="cName" placeholder="Name"></div>
                <div class="entry-row"><span>📱</span><input type="tel" id="cPhone" placeholder="Phone"></div>
                <div class="entry-row"><span>🏠</span><input type="text" id="cHouseNum" placeholder="House No."></div>
                <div class="entry-row"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street"></div>
                <div class="entry-row"><span>📍</span><input type="text" id="cPostcode" placeholder="Postcode"></div>
                <div class="entry-row"><span>💰</span><input type="number" id="cPrice" placeholder="Price £"></div>
                <textarea id="cNotes" placeholder="Private Notes..."></textarea>
                <button class="btn-primary-large" onclick="saveCustomer()">✨ Save Customer</button>
            </div>
            
            <div class="bank-vault">
                <div class="vault-header">
                    <h3>🏦 Bank Vault</h3>
                    <div class="vault-button-stack">
                        <button id="copyBankBtn" class="vault-btn-common vault-copy-btn" onclick="copyBankDetails()">📋 COPY</button>
                        <button id="bankLockBtn" class="vault-btn-common vault-unlock-surgical" onclick="toggleBankLock()">🔓 UNLOCK</button>
                    </div>
                </div>
                <input type="text" id="bankName" class="bank-field-fixed" readonly placeholder="Account Name">
                <input type="text" id="bankSort" class="bank-field-fixed" readonly placeholder="Sort Code">
                <input type="number" id="bankAcc" class="bank-field-fixed" readonly placeholder="Account Number">
                <button id="bankSaveBtn" class="hidden btn-primary-large" style="background:var(--success); margin-top:15px;" onclick="saveBankDetails()">💾 Save Details</button>
            </div>

            <div class="reset-area-surgical">
                <button class="btn-reset-surgical" onclick="completeCycle()">🚀 START NEW MONTH</button>
                <p style="font-size:12px; opacity:0.5; margin-top:15px; line-height:1.4;">Resets all customers to 'uncleaned' and clears the monthly ledger spend.</p>
            </div>
        </section>

        <section id="ledger-root" class="tab-content">
            <button class="nav-back" onclick="openTab('home-root')">🏠 Back to Home</button>
            <div class="ledger-hero-display"><small>MONTH SPEND</small><div id="ledgerTotal">£0.00</div></div>
            <div class="ledger-card-box">
                <input type="text" id="expDesc" placeholder="Description" class="ledger-field">
                <input type="number" id="expAmt" placeholder="Amount £" class="ledger-field">
                <button class="ledger-btn-save" onclick="addExpense()">Add Expense</button>
            </div>
            <div class="ledger-qb-grid"><button onclick="exportToCSV('income')">💹 Income CSV</button><button onclick="exportToCSV('spend')">📋 Spend CSV</button></div>
            <div style="text-align:center; margin-bottom:15px;"><small style="opacity:0.4; font-weight:700; text-transform:uppercase; letter-spacing:1px;">Double-tap an entry to delete</small></div>
            <div id="ledger-list-container"></div>
        </section>

        <section id="stats-root" class="tab-content">
            <button class="nav-back" onclick="openTab('home-root')">🏠 Back to Home</button>
            <div id="stats-container"></div>
        </section>

        <section id="weeks-root" class="tab-content">
            <button class="nav-back" onclick="openTab('home-root')">🏠 Back to Home</button>
            <div class="weeks-hub-grid">
                <button onclick="viewWeek(1)">Week 1</button><button onclick="viewWeek(2)">Week 2</button>
                <button onclick="viewWeek(3)">Week 3</button><button onclick="viewWeek(4)">Week 4</button>
                <button class="full" onclick="viewWeek(5)">Week 5</button>
            </div>
        </section>

        <section id="week-view-root" class="tab-content">
            <div class="dual-nav-row">
                <button class="nav-half" onclick="openTab('weeks-root')">⬅️ Hub</button>
                <button class="nav-half" onclick="openTab('home-root')">🏠 Home</button>
            </div>
            <div id="bulk-box"></div>
            <div id="week-list-container"></div>
        </section>
    </div>

    <footer id="global-version-footer">v29.6</footer>

    <div id="msgModal" class="modal-overlay hidden" onclick="closeMsgModal()"><div class="modal-content" onclick="event.stopPropagation()"><h3>Send Invoice?</h3><p id="msgPreview" style="white-space: pre-wrap; text-align: left; font-size: 13px; line-height: 1.5; background: var(--bg); padding: 15px; border-radius: 15px; margin-bottom: 20px; color: var(--text); font-weight: 500;"></p><div id="modalButtons"></div></div></div>

    <script src="app.js?v=296"></script>
</body>
</html>
