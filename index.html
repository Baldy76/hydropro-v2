<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v22.3</title>
    <link rel="stylesheet" href="styles.css?v=223">
</head>
<body class="light-mode">

    <div class="mode-switch-wrapper">
        <label class="ios-switch">
            <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
            <span class="slider"></span>
        </label>
    </div>

    <header id="branding-shield">
        <img src="Logo.png" class="logo-img" alt="Hydro Pro">
        <div class="home-hero">
            <div id="greetingMsg" class="home-greeting">Good Morning, Partner! ☕</div>
            <div id="headerDate" class="home-date"></div>
        </div>
    </header>

    <div id="globalNav" class="subpage-nav hidden">
        <button class="back-pill-ironclad" onclick="openTab('home')">🏠 Back to Home</button>
    </div>

    <div id="actionModal" class="modal-overlay hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalCustomerName" class="modal-title-locked"></div>
            <p id="modalCustomerAddress" class="modal-sub-locked"></p>
            <div class="modal-action-grid">
                <button class="modal-btn btn-edit" id="modalEditBtn">✏️ Edit Details</button>
                <button class="modal-btn btn-cancel" onclick="closeModal()">❌ Return to List</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div id="home" class="tab-content active">
            <div class="home-grid">
                <button class="tile tile-admin" onclick="openTab('admin')"><span>✨</span><small>Setup</small></button>
                <button class="tile tile-admin" onclick="openTab('master')"><span>👥</span><small>Custs</small></button>
                <button class="tile tile-admin" onclick="openTab('stats')"><span>📊</span><small>Stats</small></button>
                <button class="tile tile-admin" onclick="openTab('spend')"><span>💸</span><small>Ledger</small></button>
                <button class="tile tile-weekly-hub" onclick="openTab('weeksHub')"><span>📅</span><small>Weekly Work</small></button>
            </div>
        </div>

        <div id="admin" class="tab-content">
            <div class="card ironclad-card">
                <h3 class="setup-label-fixed">👤 Add/Edit Customer</h3>
                <input type="hidden" id="editId">
                <div class="iron-input-row"><div class="fun-icon">👤</div><div class="iron-stack"><label>Name</label><input type="text" id="cName" class="iron-input"></div></div>
                <div class="iron-input-row"><div class="fun-icon">📱</div><div class="iron-stack"><label>Phone</label><input type="tel" id="cPhone" class="iron-input"></div></div>
                <div class="iron-input-row"><div class="fun-icon">🏠</div><div class="iron-stack"><label>House No.</label><input type="text" id="cHouseNum" class="iron-input"></div></div>
                <div class="iron-input-row"><div class="fun-icon">🛣️</div><div class="iron-stack"><label>Street</label><input type="text" id="cStreet" class="iron-input"></div></div>
                <div class="iron-input-row"><div class="fun-icon">📍</div><div class="iron-stack"><label>Postcode</label><input type="text" id="cPostcode" class="iron-input"></div></div>
                <div class="iron-input-row"><div class="fun-icon">💰</div><div class="iron-stack"><label>Price £</label><input type="number" id="cPrice" class="iron-input"></div></div>
                <div class="iron-input-row" style="border:none; height:auto; padding-top:15px;">
                    <div class="fun-icon">📝</div>
                    <div class="iron-stack"><label>Private Notes</label><textarea id="cNotes" class="iron-textarea"></textarea></div>
                </div>
                <button class="ironclad-save-btn" onclick="saveCustomer()">✨ Save Customer</button>
            </div>

            <div class="card ironclad-card bank-vault-border">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 class="setup-label-fixed" style="margin:0">🏦 Bank Details</h3>
                    <button id="bankLockBtn" class="bank-unlock-ironclad" onclick="toggleBankLock()">🔓 Unlock</button>
                </div>
                <div class="iron-input-row"><div class="fun-icon">🏷️</div><div class="iron-stack"><label>Account Name</label><input type="text" id="bankName" class="iron-input bank-field" readonly></div></div>
                <div class="iron-input-row"><div class="fun-icon">🔢</div><div class="iron-stack"><label>Sort Code</label><input type="text" id="bankSort" class="iron-input bank-field" readonly maxlength="8"></div></div>
                <div class="iron-input-row" style="border:none"><div class="fun-icon">💳</div><div class="iron-stack"><label>Account Number</label><input type="number" id="bankAcc" class="iron-input bank-field" readonly></div></div>
                <button id="bankSaveBtn" class="ironclad-save-btn hidden" onclick="saveBankDetails()" style="background:var(--success); margin-top:20px;">💾 Save Bank Details</button>
            </div>
        </div>

        <div id="master" class="tab-content">
            <div class="search-shield"><input type="text" id="mainSearch" class="search-input-pill" placeholder="🔍 Search customers..." oninput="renderMasterTable()"></div>
            <div id="masterTableBody" class="iron-spaced-stack"></div>
            <div class="fixed-bottom-shield"><div class="action-card-green"><button class="btn-clear-large" onclick="completeCycle()">🚀 START NEW MONTH</button></div></div>
        </div>

        <div id="weeksHub" class="tab-content"></div><div id="week1" class="tab-content"></div><div id="week2" class="tab-content"></div><div id="week3" class="tab-content"></div><div id="week4" class="tab-content"></div><div id="week5" class="tab-content"></div>
        <div id="stats" class="tab-content"></div><div id="spend" class="tab-content"></div>
    </div>

    <div class="page-version-footer">v22.3 - IRONCLAD LOCKDOWN ACTIVE</div>
    <script src="app.js?v=223"></script>
</body>
</html>
