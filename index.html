<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v46.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="styles.css?v=460">
</head>
<body class="light-mode">

    <header id="G-HEADER">
        <div class="G-LOGO-WRAP"><img src="Logo.png" id="mainLogo" alt="HydroPro"></div>
        <div class="CENTRAL-STATUS-POD">
            <div id="weather-pill" class="G-WEATHER-PILL" onclick="launchWeatherApp()">
                <span id="w-icon">🌤️</span><small id="w-text">SYNC...</small>
            </div>
            <div class="G-SWITCH-WRAP">
                <span class="MODE-LABEL">LIT</span>
                <label class="ios-switch">
                    <input type="checkbox" id="themeCheckbox">
                    <span class="ios-slider"></span>
                </label>
                <span class="MODE-LABEL">DRK</span>
            </div>
        </div>
        <div class="DATE-CONTAINER"><span id="dateText"></span></div>
    </header>

    <main id="G-VIEWPORT">
        <section id="home-root" class="tab-content active">
            <div class="HUB-grid-container">
                <div class="HUB-row">
                    <button class="HUB-btn" onclick="openTab('admin-root')"><span class="HUB-icon">⚙️</span><small class="HUB-label">Admin</small></button>
                    <button class="HUB-btn" onclick="openTab('master-root')"><span class="HUB-icon">👥</span><small class="HUB-label">Custs</small></button>
                </div>
                <div class="HUB-row">
                    <button class="HUB-btn" onclick="openTab('finances-root')"><span class="HUB-icon">💰</span><small class="HUB-label">Finances</small></button>
                    <button class="HUB-btn" onclick="openTab('weeks-root')"><span class="HUB-icon">📅</span><small class="HUB-label">Weeks</small></button>
                </div>
            </div>
            <div class="HUB-sync-area">
                <button class="HUB-sync-btn" onclick="location.reload(true)">🔄 SYNC UPDATES</button>
            </div>
        </section>

        <section id="admin-root" class="tab-content">
            <button class="ADM-back-btn" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="ADM-vault">
                <h3 class="ADM-title">Quick Add Customer</h3>
                <div class="ADM-input-row"><span>👤</span><input type="text" id="cName" placeholder="Name"></div>
                <div class="ADM-input-row"><span>🏠</span><input type="text" id="cHouseNum" placeholder="No."></div>
                <div class="ADM-input-row"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street"></div>
                <div class="ADM-input-row"><span>💰</span><input type="number" id="cPrice" placeholder="Price £"></div>
                <button class="ADM-save-btn" onclick="saveCustomer()">✨ SAVE CUSTOMER</button>
            </div>
            <div class="ADM-vault">
                <h3 class="ADM-title">Bank Details</h3>
                <div class="ADM-input-row"><span>🏦</span><input type="text" id="bName" placeholder="Name"></div>
                <div class="ADM-input-row"><span>💳</span><input type="text" id="bAcc" placeholder="Acc No."></div>
                <button class="ADM-save-btn" style="background:var(--accent);" onclick="saveBank()">🔒 SECURE BANK</button>
            </div>
            <div class="ADM-utility-vault">
                <button class="ADM-util-btn blue" onclick="exportToQuickBooks()">📊 QUICKBOOKS EXPORT</button>
                <div class="ADM-util-row">
                    <button class="ADM-util-btn grey" onclick="exportData()">📤 Backup</button>
                    <button class="ADM-util-btn grey" onclick="document.getElementById('importFile').click()">📥 Restore</button>
                </div>
                <button class="ADM-util-btn green" onclick="completeCycle()">🚀 START NEW MONTH</button>
                <button class="ADM-util-btn red" onclick="nuclearReset()">☢️ FACTORY RESET</button>
            </div>
        </section>

        <section id="master-root" class="tab-content">
            <button class="CST-back-btn" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="CST-search-vault">
                <input type="text" id="mainSearch" placeholder="🔍 Search Customers..." oninput="renderMaster()">
            </div>
            <div id="master-list-container"></div>
        </section>

        <section id="finances-root" class="tab-content">
            <button class="FIN-back-btn" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div id="finances-dashboard-container"></div>
            <div id="finances-statement-container"></div>
        </section>
    </main>

    <div id="briefingModal" class="modal-overlay hidden" onclick="closeBriefing()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="briefingData"></div>
            <button class="ADM-save-btn" style="margin-top:20px;" onclick="closeBriefing()">CLOSE</button>
        </div>
    </div>

    <footer id="G-FOOTER">v46.0 VAULTED FRAMEWORK</footer>
    <script src="app.js?v=460"></script>
</body>
</html>
