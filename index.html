<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v43.1</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="styles.css?v=431">
</head>
<body class="light-mode">

    <header id="G-HEADER">
        <div class="G-LOGO-WRAP"><img src="Logo.png" id="mainLogo" alt="HydroPro"></div>
        <div class="CENTRAL-STATUS-POD">
            <div id="weather-pill" class="G-WEATHER-PILL" onclick="launchWeatherApp()">
                <span id="w-icon">🌤️</span><small id="w-text">SYNC...</small>
            </div>
            <div class="G-SWITCH-WRAP">
                <span class="MODE-LABEL">LIGHT</span>
                <label class="ios-switch">
                    <input type="checkbox" id="themeCheckbox">
                    <span class="ios-slider"></span>
                </label>
                <span class="MODE-LABEL">DARK</span>
            </div>
        </div>
        <div class="DATE-CONTAINER"><span id="dateText"></span></div>
    </header>

    <main id="G-VIEWPORT">
        <section id="home-root" class="tab-content active">
            <div class="HUB-LOCK-CONTAINER">
                <div class="GRID-ROW">
                    <button class="BLOCK-BTN" onclick="openTab('admin-root')"><span class="I-LOCK">⚙️</span><small class="T-LOCK">Admin</small></button>
                    <button class="BLOCK-BTN" onclick="openTab('master-root')"><span class="I-LOCK">👥</span><small class="T-LOCK">Custs</small></button>
                </div>
                <div class="GRID-ROW">
                    <button class="BLOCK-BTN" onclick="openTab('finances-root')"><span class="I-LOCK">💰</span><small class="T-LOCK">Finances</small></button>
                    <button class="BLOCK-BTN" onclick="openTab('weeks-root')"><span class="I-LOCK">📅</span><small class="T-LOCK">Weeks</small></button>
                </div>
            </div>
            <div class="SYNC-AREA"><button class="SYNC-BTN-LOCKED" onclick="location.reload(true)">🔄 SYNC UPDATES</button></div>
        </section>

        <section id="admin-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="VAULT-CARD">
                <h3 class="VAULT-HDR">Add New Customer</h3>
                <div class="VAULT-ROW"><span>👤</span><input type="text" id="cName" placeholder="Name"></div>
                <div class="VAULT-ROW"><span>🏠</span><input type="text" id="cHouseNum" placeholder="No."></div>
                <div class="VAULT-ROW"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street"></div>
                <div class="VAULT-ROW"><span>💰</span><input type="number" id="cPrice" placeholder="Price £"></div>
                <button class="VAULT-SAVE-BTN" onclick="saveCustomer()">✨ SAVE CUSTOMER</button>
            </div>

            <div class="VAULT-CARD">
                <h3 class="VAULT-HDR">Business Bank Details</h3>
                <div class="VAULT-ROW"><span>🏦</span><input type="text" id="bName" placeholder="Acc Name"></div>
                <div class="VAULT-ROW"><span>🔢</span><input type="text" id="bSort" placeholder="Sort Code"></div>
                <div class="VAULT-ROW"><span>💳</span><input type="text" id="bAcc" placeholder="Acc Number"></div>
                <button class="VAULT-SAVE-BTN" style="background:var(--accent);" onclick="saveBank()">🔒 SECURE BANK INFO</button>
            </div>

            <div class="ADMIN-VAULT">
                <h3 class="VAULT-HDR" style="color:var(--text); opacity:0.8;">QuickBooks & Backups</h3>
                <button class="ADMIN-BTN-BLUE" onclick="exportToQuickBooks()">📊 EXPORT TO QUICKBOOKS</button>
                <div class="ADMIN-ROW">
                    <button class="ADMIN-BTN-GREY" onclick="exportData()">📤 Backup</button>
                    <button class="ADMIN-BTN-GREY" onclick="document.getElementById('importFile').click()">📥 Restore</button>
                    <input type="file" id="importFile" hidden onchange="importData(event)" accept=".csv">
                </div>
            </div>

            <div class="ADMIN-VAULT" style="margin-bottom:120px;">
                <button class="ADMIN-BTN-BLUE" style="background:var(--success);" onclick="completeCycle()">🚀 START NEW MONTH</button>
                <button class="ADMIN-BTN-RED" onclick="nuclearReset()">☢️ FACTORY RESET DATA</button>
            </div>
        </section>

        <section id="finances-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div id="finances-dashboard-container"></div>
            <div id="finances-statement-container"></div>
        </section>

        <section id="master-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="CONCRETE-SEARCH-VAULT"><input type="text" id="mainSearch" placeholder="🔍 Search Customers..." oninput="renderMaster()"></div>
            <div id="master-list-container"></div>
        </section>

        <section id="weeks-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="HUB-LOCK-CONTAINER">
                <div class="GRID-ROW"><button class="BLOCK-BTN" onclick="viewWeek(1)">1</button><button class="BLOCK-BTN" onclick="viewWeek(2)">2</button></div>
                <div class="GRID-ROW"><button class="BLOCK-BTN" onclick="viewWeek(3)">3</button><button class="BLOCK-BTN" onclick="viewWeek(4)">4</button></div>
                <div class="GRID-ROW"><button class="BLOCK-BTN FULL-W" onclick="viewWeek(5)">5</button></div>
            </div>
        </section>
    </main>

    <footer id="G-FOOTER">v43.1 FINANCIAL FORTRESS</footer>
    <script src="app.js?v=431"></script>
</body>
</html>
