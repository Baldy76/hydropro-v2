<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v21.3</title>
    <link rel="stylesheet" href="styles.css?v=213">
</head>
<body class="light-mode">

    <div class="mode-switch-wrapper">
        <label class="ios-switch">
            <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
            <span class="slider"></span>
        </label>
    </div>

    <header id="branding-shield">
        <img src="Logo.png" class="logo-img" alt="Hydro Pro">
        <div class="home-hero">
            <div id="greetingMsg" class="home-greeting">Good Morning, Partner! ☕</div>
            <div id="headerDate" class="home-date"></div>
        </div>
    </header>

    <div id="globalNav" class="subpage-nav hidden">
        <button class="back-pill" onclick="openTab('home')">🏠 Back to Home</button>
    </div>

    <div id="actionModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="modalCustomerName" class="modal-title-locked"></div>
            <p id="modalCustomerAddress" class="modal-sub-locked"></p>
            <div class="modal-action-grid">
                <button class="modal-btn btn-edit" id="modalEditBtn">✏️ Edit Details</button>
                <button class="modal-btn btn-cancel" onclick="closeModal()">❌ Return to List</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        
        <div id="home" class="tab-content active">
            <div class="home-grid">
                <button class="tile tile-admin" onclick="openTab('admin')"><span>✨</span><small>Setup</small></button>
                <button class="tile tile-admin" onclick="openTab('master')"><span>👥</span><small>Custs</small></button>
                <button class="tile tile-admin" onclick="openTab('stats')"><span>📊</span><small>Stats</small></button>
                <button class="tile tile-admin" onclick="openTab('spend')"><span>💸</span><small>Ledger</small></button>
                <button class="tile tile-weekly-hub" onclick="openTab('weeksHub')"><span>📅</span><small>Weekly Work</small></button>
            </div>
        </div>

        <div id="master" class="tab-content">
            <div class="search-shield"><input type="text" id="mainSearch" class="search-input-pill" placeholder="🔍 Search customers..." oninput="renderMasterTable()"></div>
            <div id="masterTableBody"></div>
            <div class="fixed-bottom-shield"><div class="action-card-green"><button class="btn-clear-large" onclick="completeCycle()">🚀 START NEW MONTH</button></div></div>
        </div>

        <div id="stats" class="tab-content">
            <div class="stats-hero-card">
                <div id="currentMonthYear" class="stats-summary-title">Summary</div>
                <div id="currProfit" class="stats-main-amount">£0.00</div>
                <div class="stats-hero-sub">💰 Total Profit in Pocket</div>
            </div>
            <div class="customer-pill-bubble stats-progress-bubble">
                <div class="progress-header-centered">
                    <small>MONTHLY PROGRESS</small>
                    <div id="progressPercent" class="amt-blue-bold">0%</div>
                </div>
                <div class="progress-bar-bg"><div id="progressBarFill" class="progress-bar-fill"></div></div>
                <div class="progress-footer">
                    <span>TARGET: <strong id="statsTarget">£0.00</strong></span>
                    <span>REMAINING: <strong id="statsRemaining">£0.00</strong></span>
                </div>
            </div>
            <div class="stats-grid-2x1">
                <div class="customer-pill-bubble stats-mini-bubble">
                    <small>MONTH INCOME 🔍</small>
                    <div class="amt-green-bold" id="statsIncome">£0.00</div>
                </div>
                <div class="customer-pill-bubble stats-mini-bubble">
                    <small>MONTH SPEND 🔍</small>
                    <div class="amt-red-bold" id="statsSpend">£0.00</div>
                </div>
            </div>
            <div class="arrears-pill-container">
                <div class="arrears-pill-bubble">Arrears 🔍 <span id="statsArrears">£0.00</span></div>
            </div>
            <h3 class="hall-of-fame-title">🏆 The Hall of Fame</h3>
            <div id="monthlyHistoryContainer"></div>
        </div>

        <div id="spend" class="tab-content">
            <div class="card ledger-card">
                <h3 class="ledger-title">💸 Log Expense</h3>
                <div class="ledger-input-stack">
                    <input type="text" id="expDesc" placeholder="Description" class="ledger-input">
                    <input type="number" id="expAmt" placeholder="Amount £" class="ledger-input">
                    <button class="btn-ledger-add" onclick="addExpense()">Add Expense</button>
                </div>
            </div>
            <div class="card ledger-card">
                <h3 class="ledger-title">📊 QuickBooks Exports</h3>
                <div class="ledger-grid-2x1">
                    <button class="btn-qb-export" onclick="exportToCSV('income')">💹 QB Income</button>
                    <button class="btn-qb-export" onclick="exportToCSV('spend')">📋 QB Spend</button>
                </div>
            </div>
            <h3 class="ledger-section-label">💸 Spend History</h3>
            <div id="expenseList"></div>
        </div>

        <div id="admin" class="tab-content">
            <div class="card creative-form-card">
                <input type="hidden" id="editId">
                <div class="fun-input-group">
                    <div class="fun-icon">👤</div>
                    <div class="fun-field-stack"><label>Customer Name</label><input type="text" id="cName" class="creative-input" placeholder="Full Name"></div>
                </div>
                <div class="fun-input-group">
                    <div class="fun-icon">🏠</div>
                    <div class="fun-field-stack"><label>House No.</label><input type="text" id="cHouseNum" class="creative-input" placeholder="e.g. 22"></div>
                </div>
                <div class="fun-input-group">
                    <div class="fun-icon">🛣️</div>
                    <div class="fun-field-stack"><label>Street</label><input type="text" id="cStreet" class="creative-input" placeholder="Street Name"></div>
                </div>
                <div class="fun-input-group">
                    <div class="fun-icon">📍</div>
                    <div class="fun-field-stack"><label>Postcode</label><input type="text" id="cPostcode" class="creative-input postcode-input" placeholder="Postcode"></div>
                </div>
                <div class="fun-input-group">
                    <div class="fun-icon">💰</div>
                    <div class="fun-field-stack"><label>Price £</label><input type="number" id="cPrice" class="creative-input" placeholder="0.00"></div>
                </div>
                <div class="fun-input-group" style="border:none">
                    <div class="fun-icon">📝</div>
                    <div class="fun-field-stack"><label>Private Notes</label><textarea id="cNotes" class="creative-textarea"></textarea></div>
                </div>
                <button class="creative-save-btn" onclick="saveCustomer()">✨ Save Customer</button>
            </div>
        </div>

        <div id="weeksHub" class="tab-content">
            <div class="weeks-grid">
                <button class="tile-week-blue" onclick="openTab('week1')">Week 1</button>
                <button class="tile-week-blue" onclick="openTab('week2')">Week 2</button>
                <button class="tile-week-blue" onclick="openTab('week3')">Week 3</button>
                <button class="tile-week-blue" onclick="openTab('week4')">Week 4</button>
                <button class="tile-week-blue tile-week-5" onclick="openTab('week5')">Week 5</button>
            </div>
        </div>

        <div id="week1" class="tab-content"></div><div id="week2" class="tab-content"></div><div id="week3" class="tab-content"></div><div id="week4" class="tab-content"></div><div id="week5" class="tab-content"></div>
    </div>

    <div class="page-version-footer">v21.3 - Final Polish Build</div>
    <script src="app.js?v=213"></script>
</body>
</html>
