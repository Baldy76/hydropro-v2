<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v13.8 Restore</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">

    <div class="sticky-header">
        <div class="header-top">
            <img src="Logo.png" class="logo-img" alt="Logo">
            <div class="mode-switch-wrapper">
                <label class="ios-switch">
                    <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <div class="date-container">
            <div id="greetingMsg" class="greeting-txt">Hey there!</div>
            <div id="headerDate" class="date-txt"></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="openTab(event, 'admin')">Setup</button>
            <button class="tab" onclick="openTab(event, 'master')">Custs</button>
            <button class="tab" onclick="openTab(event, 'stats')">Stats</button>
            <button class="tab" onclick="openTab(event, 'spend')">Ledger</button>
            <button class="tab" onclick="openTab(event, 'week1')">W1</button>
            <button class="tab" onclick="openTab(event, 'week2')">W2</button>
            <button class="tab" onclick="openTab(event, 'week3')">W3</button>
            <button class="tab" onclick="openTab(event, 'week4')">W4</button>
        </div>
    </div>

    <div class="main-container">
        <div id="globalSearchContainer" class="search-outer hidden">
            <input type="text" id="mainSearch" class="search-input-pill" placeholder="🔍 Find a customer..." oninput="renderMasterTable()">
        </div>

        <div id="admin" class="tab-content active">
            <div class="card">
                <h3 class="section-title">✨ Add Client</h3>
                <input type="hidden" id="editId">
                <div class="input-stack force-stack">
                    <input type="text" id="cName" placeholder="Full Name">
                    <input type="text" id="cAddr" placeholder="Address">
                    <input type="tel" id="cPhone" placeholder="Mobile Number">
                    <input type="number" id="cPrice" placeholder="Price £">
                </div>
                <div class="grid-1x2">
                    <select id="cWeek" class="large-select"><option value="1">Week 1</option><option value="2">Week 2</option><option value="3">Week 3</option><option value="4">Week 4</option></select>
                    <select id="cDay" class="large-select"><option value="Monday">Monday</option><option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option><option value="Friday">Friday</option></select>
                </div>
                <button class="btn-main full-width-btn bounce-on-tap" onclick="saveCustomer()">💾 Save Customer</button>
            </div>
            <div class="card action-card-green"><button class="btn-clear full-width-btn" onclick="completeCycle()">🚀 START NEW MONTH</button></div>
        </div>

        <div id="master" class="tab-content"><div id="masterTableBody"></div></div>

        <div id="stats" class="tab-content">
            <div class="dashboard-hero"><div class="hero-label">Net Profit</div><div class="hero-amount" id="currProfit">£0.00</div></div>
            <div class="grid-1x2" style="margin-top:15px;">
                <div class="card mini-card"><small>Revenue</small><strong id="currRevenue" style="color:var(--success)">£0.00</strong></div>
                <div class="card mini-card"><small>Spend</small><strong id="currSpend" style="color:var(--danger)">£0.00</strong></div>
            </div>
        </div>

        <div id="spend" class="tab-content">
            <div class="card"><h3 class="section-title">💸 Log Expense</h3><input type="text" id="expDesc" placeholder="Description" class="large-select"><input type="number" id="expAmt" placeholder="Amount £" class="large-select"><button class="btn-main full-width-btn bounce-on-tap" onclick="addExpense()">Add Expense</button></div>
            <div id="expenseList"></div>
        </div>

        <div id="week1" class="tab-content"></div><div id="week2" class="tab-content"></div><div id="week3" class="tab-content"></div><div id="week4" class="tab-content"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
