<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Hydro Pro v8.6</title>
    <link rel="stylesheet" href="styles.css?v=86">
</head>
<body class="light-mode">

    <div class="sticky-header">
        <div class="mode-switch-wrapper">
            <label class="ios-switch">
                <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="header-top">
            <img src="Logo.png" class="logo-img" alt="Hydro Logo">
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="openTab(event, 'admin')">Setup</button>
            <button class="tab" onclick="openTab(event, 'master')">Custs</button>
            <button class="tab" onclick="openTab(event, 'stats')">Stats</button>
            <button class="tab" onclick="openTab(event, 'spend')">Spend</button>
            <button class="tab" onclick="openTab(event, 'week1')">W1</button>
            <button class="tab" onclick="openTab(event, 'week2')">W2</button>
            <button class="tab" onclick="openTab(event, 'week3')">W3</button>
            <button class="tab" onclick="openTab(event, 'week4')">W4</button>
        </div>
    </div>

    <div class="main-container">
        <div id="headerDate" class="date-txt">Loading...</div>

        <div id="admin" class="tab-content active">
            <div class="card fade-in">
                <h3 class="section-title">New Customer</h3>
                <input type="hidden" id="editId">
                
                <div class="input-stack">
                    <input type="text" id="cName" placeholder="Full Name">
                    <input type="text" id="cAddr" placeholder="Address">
                    <input type="text" id="cPostcode" placeholder="Postcode">
                    <input type="tel" id="cPhone" placeholder="Mobile Number">
                    <input type="number" id="cPrice" placeholder="Price £">
                </div>
                
                <div class="label-heading">Schedule</div>
                <div class="grid-2">
                    <select id="cWeek">
                        <option value="1">Week 1</option><option value="2">Week 2</option>
                        <option value="3">Week 3</option><option value="4">Week 4</option>
                    </select>
                    <select id="cFreq">
                        <option value="4">4 Weeks</option><option value="8">8 Weeks</option>
                    </select>
                </div>
                
                <select id="cDay" style="margin-top:10px;">
                    <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                </select>

                <textarea id="cNotes" placeholder="Special Notes..."></textarea>
                
                <button class="btn-main full-width-btn" onclick="saveCustomer()">💾 Save Customer</button>
                
                <div id="editActions" class="hidden">
                    <button class="btn-danger full-width-btn" style="margin-top:10px;" onclick="deleteCustomer()">🗑 Delete</button>
                    <button class="btn-neutral full-width-btn" style="margin-top:10px;" onclick="clearForm()">Cancel</button>
                </div>
            </div>

            <div class="card start-month-card">
                <button class="btn-clear full-width-btn" onclick="completeCycle()">🚀 START NEW MONTH</button>
            </div>

            <div class="card">
                <h3 class="section-title">Database</h3>
                <div class="grid-2">
                    <button class="btn-ghost full-width-btn" onclick="exportFullCSV()">💾 Export</button>
                    <button class="btn-ghost full-width-btn" onclick="document.getElementById('csvFile').click()">📂 Import</button>
                </div>
                <input type="file" id="csvFile" accept=".csv" onchange="importFullCSV(event)" style="display:none;">
            </div>

            <button type="button" class="btn-uat-link" onclick="runUATClear()">Reset All App Data</button>
            <div class="version-tag">v8.6 - Interaction Fix</div>
        </div>

        <div id="master" class="tab-content">
            <div class="card no-padding overflow-hidden">
                <div class="search-container">
                    <input type="text" id="mainSearch" placeholder="🔍 Search customers..." oninput="handleSearch()">
                </div>
                <div id="masterTableBody"></div>
            </div>
        </div>
        <div id="stats" class="tab-content"></div>
        <div id="spend" class="tab-content"></div>
        <div id="week1" class="tab-content"></div>
        <div id="week2" class="tab-content"></div>
        <div id="week3" class="tab-content"></div>
        <div id="week4" class="tab-content"></div>
    </div>

    <script src="app.js?v=86"></script>
</body>
</html>
