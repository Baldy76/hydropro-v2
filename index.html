<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v25.9</title>
    <link rel="stylesheet" href="styles.css?v=259">
</head>
<body class="light-mode">

    <header id="global-header-shield">
        <div class="header-top-row">
            <div class="logo-area"><img src="Logo.png" class="oblong-logo" alt="Logo"></div>
            <button id="themeToggleBtn" class="header-theme-btn" onclick="toggleDarkMode()">🌙</button>
        </div>
        <div class="greeting-area-centered">
            <span id="greetText">GOOD MORNING, PARTNER! ☕</span>
            <span id="dateText"></span>
        </div>
    </header>

    <div class="main-viewport-container">
        <section id="fence-home" class="tab-content active">
            <div class="home-grid-lockdown">
                <button class="lock-tile" onclick="openTab('fence-setup')"><span>✨</span><small>Setup</small></button>
                <button class="lock-tile" onclick="openTab('fence-master')"><span>👥</span><small>Custs</small></button>
                <button class="lock-tile" onclick="openTab('fence-stats')"><span>📊</span><small>Stats</small></button>
                <button class="lock-tile" onclick="openTab('fence-ledger')"><span>💸</span><small>Ledger</small></button>
                <button class="lock-tile tile-full" onclick="openTab('fence-weeks')"><span>📅</span><small>Weekly Work</small></button>
            </div>
        </section>

        <section id="fence-setup" class="tab-content"></section>
        <section id="fence-master" class="tab-content"></section>
        <section id="fence-stats" class="tab-content"></section>

        <section id="fence-ledger" class="tab-content">
            <button class="back-home-pill-top" onclick="openTab('fence-home')">🏠 Back to Home</button>
            
            <div class="ledger-card">
                <h3 class="ledger-label">💸 Log Expense</h3>
                <input type="text" id="expDesc" placeholder="Description (e.g. Fuel)" class="ledger-input">
                <input type="number" id="expAmt" placeholder="Amount £" class="ledger-input">
                <button class="ledger-save-btn" onclick="addExpense()">Add Expense</button>
            </div>

            <div class="ledger-card">
                <h3 class="ledger-label">📊 QuickBooks Exports</h3>
                <div class="qb-grid-dual">
                    <button class="btn-qb" onclick="exportToCSV('income')">💹 QB Income</button>
                    <button class="btn-qb" onclick="exportToCSV('spend')">📋 QB Spend</button>
                </div>
            </div>

            <h3 class="history-label">💸 Spend History</h3>
            <div id="expense-list-container" class="iron-list-stack"></div>
        </section>

        <section id="fence-weeks" class="tab-content"></section>
    </div>

    <footer id="footer-version">v25.9 - Ledger Namespace Lockdown</footer>
    <script src="app.js?v=259"></script>
</body>
</html>
