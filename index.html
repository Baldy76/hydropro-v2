<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v41.5</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="AppIcon.png">
    <link rel="icon" type="image/png" href="AppIcon.png">
    <link rel="stylesheet" href="styles.css?v=415">
</head>
<body class="light-mode">

    <header id="G-HEADER">
        <div class="G-LOGO-WRAP"><img src="Logo.png" id="mainLogo" alt="HydroPro"></div>
        <div class="G-NAV-ZONE">
            <div id="weather-pill" class="G-WEATHER-PILL" onclick="launchWeatherApp()">
                <span id="w-icon">🌤️</span><small id="w-text">GPS SYNC...</small>
            </div>
            <div class="G-SWITCH-WRAP">
                <label class="ios-switch">
                    <input type="checkbox" id="themeCheckbox">
                    <span class="ios-slider"></span>
                    <span class="ios-slider-label-light">LIGHT</span>
                </label>
            </div>
        </div>
        <span id="dateText"></span>
    </header>

    <main id="G-VIEWPORT">
        <section id="home-root" class="tab-content active">
            <div class="FIXED-GRID">
                <button class="GRID-BTN" onclick="openTab('setup-root')"><span>✨</span><small>Setup</small></button>
                <button class="GRID-BTN" onclick="openTab('master-root')"><span>👥</span><small>Custs</small></button>
                <button class="GRID-BTN" onclick="openTab('stats-root')"><span>📊</span><small>Stats</small></button>
                <button class="GRID-BTN" onclick="openTab('ledger-root')"><span>💸</span><small>Ledger</small></button>
                <button class="GRID-BTN FULL-W" onclick="openTab('weeks-root')"><span>📅</span><small>Weekly Work</small></button>
            </div>
            <div class="SYNC-AREA">
                <button class="SYNC-BTN-LOCKED" onclick="location.reload(true)">🔄 SYNC UPDATES</button>
            </div>
        </section>

        <section id="setup-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="VAULT-CARD">
                <div class="VAULT-ROW"><span>👤</span><input type="text" id="cName" placeholder="Name"></div>
                <div class="VAULT-ROW"><span>📱</span><input type="tel" id="cPhone" placeholder="Phone"></div>
                <div class="VAULT-ROW"><span>🏠</span><input type="text" id="cHouseNum" placeholder="House No."></div>
                <div class="VAULT-ROW"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street"></div>
                <div class="VAULT-ROW"><span>📍</span><input type="text" id="cPostcode" placeholder="Postcode"></div>
                <div class="VAULT-ROW"><span>💰</span><input type="number" id="cPrice" placeholder="Price £"></div>
                <textarea id="cNotes" class="VAULT-NOTES" placeholder="Notes..."></textarea>
                <button class="VAULT-SAVE-BTN" onclick="saveCustomer()">✨ SAVE CUSTOMER</button>
            </div>
            <div class="ADMIN-VAULT">
                <button class="ADMIN-BTN-BLUE" onclick="completeCycle()">🚀 START NEW MONTH</button>
                <div class="ADMIN-ROW">
                    <button class="ADMIN-BTN-GREY" onclick="exportData()">📤 Backup</button>
                    <button class="ADMIN-BTN-GREY" onclick="document.getElementById('importFile').click()">📥 Restore</button>
                    <input type="file" id="importFile" hidden onchange="importData(event)" accept=".csv">
                </div>
                <button class="ADMIN-BTN-RED" onclick="nuclearReset()">☢️ FACTORY RESET DATA</button>
            </div>
        </section>

        <section id="master-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="SEARCH-VAULT">
                <input type="text" id="mainSearch" placeholder="🔍 Search Name, Street or Postcode..." oninput="renderMaster()">
            </div>
            <div id="master-list-container"></div>
        </section>

        <section id="stats-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div id="stats-dashboard-container"></div>
        </section>

        <section id="ledger-root" class="tab-content">
            <button class="BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="LD-LOCKED-HERO"><small>TOTAL SPEND</small><div id="ledgerTotalDisplay">£0.00</div></div>
            <div class="VAULT-CARD">
                <div class="VAULT-ROW"><input type="text" id="expDesc" placeholder="Expense description"></div>
                <div class="VAULT-ROW"><input type="number" id="expAmt" placeholder="Amount £"></div>
                <button class="VAULT-SAVE-BTN" onclick="addExpense()">Add Expense</button>
            </div>
            <div id="ledger-list-container"></div>
        </section>

        <section id="weeks-root" class="tab-content"><button class="BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button><div class="WK-HUB-GRID"><button class="WK-TILE" onclick="viewWeek(1)">Week 1</button><button class="WK-TILE" onclick="viewWeek(2)">Week 2</button><button class="WK-TILE" onclick="viewWeek(3)">Week 3</button><button class="WK-TILE" onclick="viewWeek(4)">Week 4</button><button class="WK-TILE WK-FULL" onclick="viewWeek(5)">Week 5</button></div></section>
        <section id="week-view-root" class="tab-content"><div class="NAV-VAULT"><button onclick="openTab('weeks-root')">⬅️ Back</button><button onclick="openTab('home-root')">🏠 Hub</button></div><div id="week-list-container"></div></section>
    </main>

    <div id="briefingModal" class="modal-overlay hidden" onclick="closeBriefing()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="briefingData"></div>
            <div id="briefHistoryZone"></div>
            <div id="quickSettleContainer"></div>
            <button class="MD-EDIT" id="briefEditBtn">⚙️ Edit Info</button>
            <button class="MD-CLOSE" onclick="closeBriefing()">CLOSE</button>
        </div>
    </div>

    <div id="editModal" class="modal-overlay hidden" onclick="closeEditModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin:0 0 25px; color:var(--accent); text-align:center;">Edit Profile</h2>
            <input type="hidden" id="eEditId">
            <div class="VAULT-ROW"><span>👤</span><input type="text" id="eName"></div>
            <div class="VAULT-ROW"><span>💰</span><input type="number" id="ePrice"></div>
            <button class="VAULT-SAVE-BTN" onclick="updateCustomerFromModal()">💾 SAVE CHANGES</button>
            <button class="ADMIN-BTN-GREY" style="margin-top:15px;" onclick="closeEditModal()">CANCEL</button>
        </div>
    </div>
    
    <footer id="version-label">v41.5 VAULT SEARCH</footer>
    <script src="app.js?v=415"></script>
</body>
</html>
