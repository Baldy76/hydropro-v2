<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v22.8</title>
    <link rel="stylesheet" href="styles.css?v=228">
</head>
<body class="light-mode">

    <div class="mode-switch-wrapper">
        <label class="ios-switch">
            <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
            <span class="slider"></span>
        </label>
    </div>

    <header id="branding-shield">
        <img src="Logo.png" class="logo-img" alt="Hydro Pro">
        <div class="home-hero">
            <div id="greetingMsg" class="home-greeting-ironclad">GOOD MORNING, PARTNER! ☕</div>
            <div id="headerDate" class="home-date-ironclad"></div>
        </div>
    </header>

    <div id="globalNav" class="subpage-nav hidden">
        <button class="back-pill-ironclad" onclick="openTab('home')">🏠 Back to Home</button>
    </div>

    <div class="main-container">
        
        <div id="home" class="tab-content active">
            <div class="home-grid-ironclad">
                <button class="tile-restore" onclick="openTab('admin')">
                    <span>✨</span>
                    <small>Setup</small>
                </button>
                <button class="tile-restore" onclick="openTab('master')">
                    <span>👥</span>
                    <small>Custs</small>
                </button>
                <button class="tile-restore" onclick="openTab('stats')">
                    <span>📊</span>
                    <small>Stats</small>
                </button>
                <button class="tile-restore" onclick="openTab('spend')">
                    <span>💸</span>
                    <small>Ledger</small>
                </button>
                <button class="tile-restore tile-weekly-hub-ironclad" onclick="openTab('weeksHub')">
                    <span>📅</span>
                    <small>Weekly Work</small>
                </button>
            </div>
        </div>

        <div id="admin" class="tab-content">
            </div>

        <div id="master" class="tab-content">
            <div class="search-shield"><input type="text" id="mainSearch" class="search-input-pill" placeholder="🔍 Search..."></div>
            <div id="masterTableBody" class="iron-spaced-stack"></div>
            <div class="fixed-bottom-shield"><div class="action-card-green"><button class="btn-clear-large" onclick="completeCycle()">🚀 START NEW MONTH</button></div></div>
        </div>

        <div id="stats" class="tab-content"></div>
        <div id="spend" class="tab-content"></div>
        <div id="weeksHub" class="tab-content"></div>
    </div>

    <footer class="centered-version-footer">v22.8 - Home Hub Restored</footer>

    <script src="app.js?v=228"></script>
</body>
</html>
