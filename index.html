<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v16.4</title>
    <link rel="stylesheet" href="styles.css?v=164">
</head>
<body class="light-mode">

    <div class="app-header">
        <img src="Logo.png" class="logo-img" alt="Logo">
        <div class="mode-switch-wrapper">
            <label class="ios-switch">
                <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="main-container">
        
        <div id="home" class="tab-content active">
            <div class="home-hero">
                <div id="greetingMsg" class="home-greeting">Hello, Jonathan!</div>
                <div id="headerDate" class="home-date"></div>
            </div>

            <div class="home-grid">
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('admin')"><span>✨</span><small>Setup</small></button>
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('master')"><span>👥</span><small>Custs</small></button>
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('stats')"><span>📊</span><small>Stats</small></button>
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('spend')"><span>💸</span><small>Ledger</small></button>
                
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week1')"><span>1</span><small>Week 1</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week2')"><span>2</span><small>Week 2</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week3')"><span>3</span><small>Week 3</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week4')"><span>4</span><small>Week 4</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week5')"><span>5</span><small>Week 5</small></button>
            </div>
        </div>

        <div id="subpageNav" class="subpage-nav hidden">
            <button class="back-pill bounce-on-tap" onclick="openTab('home')">🏠 Back to Home</button>
        </div>

        <div id="admin" class="tab-content">
            <div class="card">
                <h3 class="section-title">Add Client</h3>
                <input type="hidden" id="editId">
                <div class="input-stack force-stack">
                    <input type="text" id="cName" placeholder="Full Name">
                    <input type="text" id="cAddr" placeholder="Address">
                    <input type="tel" id="cPhone" placeholder="Mobile">
                    <input type="number" id="cPrice" placeholder="Price £">
                </div>
                <div class="grid-1x2">
                    <select id="cWeek" class="large-select">
                        <option value="1">Week 1</option><option value="2">Week 2</option>
                        <option value="3">Week 3</option><option value="4">Week 4</option><option value="5">Week 5</option>
                    </select>
                    <select id="cDay" class="large-select">
                        <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option><option value="Friday">Friday</option>
                    </select>
                </div>
                <button class="btn-main full-width-btn bounce-on-tap" onclick="saveCustomer()">💾 Save</button>
            </div>
        </div>

        <div id="master" class="tab-content">
            <input type="text" id="mainSearch" class="search-input-pill" placeholder="🔍 Search..." oninput="renderMasterTable()">
            <div id="masterTableBody"></div>
        </div>

        <div id="stats" class="tab-content">
            <div class="dashboard-hero"><div id="currProfit" class="hero-amount">£0.00</div><small>NET PROFIT</small></div>
        </div>

        <div id="spend" class="tab-content">
            <div class="card">
                <input type="text" id="expDesc" placeholder="Expense Name" class="large-select" style="margin-bottom:10px;">
                <input type="number" id="expAmt" placeholder="Amount £" class="large-select">
                <button class="btn-main full-width-btn bounce-on-tap" onclick="addExpense()" style="margin-top:10px;">Add Expense</button>
            </div>
            <div id="expenseList"></div>
        </div>

        <div id="week1" class="tab-content"></div><div id="week2" class="tab-content"></div><div id="week3" class="tab-content"></div><div id="week4" class="tab-content"></div><div id="week5" class="tab-content"></div>
    </div>

    <div id="globalModal" class="modal-overlay" onclick="if(event.target === this) closeModal()"><div class="modal-content"><button class="close-btn" onclick="closeModal()">✕</button><div id="modalContentBody"></div></div></div>
    <script src="app.js?v=164"></script>
</body>
</html>
