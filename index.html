<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v62.4</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="AppIcon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <link rel="stylesheet" href="styles.css?v=624">
</head>
<body class="light-mode">

    <header id="G-HEADER">
        <div class="G-LOGO-STRETCH-WRAP"><img src="Logo.png" id="mainLogo" alt="HydroPro"></div>
    </header>

    <main id="G-VIEWPORT">
        
        <section id="weeks-root" class="tab-content active">
            <div class="WEE-selection-grid">
                <div class="WEE-grid-row">
                    <button class="WEE-btn week-1" onclick="viewWeek(1)">WEEK 1</button>
                    <button class="WEE-btn week-2" onclick="viewWeek(2)">WEEK 2</button>
                </div>
                <div class="WEE-grid-row">
                    <button class="WEE-btn week-3" onclick="viewWeek(3)">WEEK 3</button>
                    <button class="WEE-btn week-4" onclick="viewWeek(4)">WEEK 4</button>
                </div>
                <div class="WEE-grid-row">
                    <button class="WEE-btn week-5 full" onclick="viewWeek(5)">WEEK 5</button>
                </div>
            </div>
        </section>

        <section id="week-view-root" class="tab-content">
            <div class="WEE-sub-nav">
                <button onclick="openTab('weeks-root')">⬅️ BACK TO WEEKS</button>
            </div>
            
            <div class="WEE-day-selector">
                <button class="WEE-day-btn active" onclick="setWorkingDay('Mon', this)">M</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Tue', this)">T</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Wed', this)">W</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Thu', this)">T</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Fri', this)">F</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Sat', this)">S</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Sun', this)">S</button>
            </div>
            
            <button class="ADM-save-btn" style="width: calc(100% - 40px); margin: 0 20px 20px; background: var(--text); color: var(--bg);" onclick="routeMyDay()">📍 ROUTE MY DAY</button>
            
            <div id="WEE-list-container"></div>
        </section>

        <section id="master-root" class="tab-content">
            <div style="padding: 0 25px 15px; width: 100%; max-width: 400px; margin: 0 auto;">
                <button class="ADM-save-btn" style="margin-top: 0; margin-bottom: 5px; box-shadow: 0 10px 25px rgba(0,122,255,0.2);" onclick="openAddCustomerModal()">➕ ADD NEW CUSTOMER</button>
            </div>
            <div class="CST-search-vault"><input type="text" id="mainSearch" placeholder="🔍 Search Name or Street..." oninput="renderMaster()"></div>
            <div id="CST-list-container"></div>
        </section>

        <section id="weather-root" class="tab-content">
            <div id="WTH-dashboard">
                <div class="empty-state"><span class="empty-icon">📡</span><div class="empty-text">Syncing Radar...</div></div>
            </div>
        </section>

        <section id="finances-root" class="tab-content">
            <div id="FIN-dashboard"></div>
            
            <div class="ADM-card" style="padding: 25px 15px;">
                <h3 class="ADM-hdr" style="margin-bottom: 20px;">Revenue Pipeline</h3>
                <div style="height: 300px; position: relative;">
                    <canvas id="financeChartCanvas"></canvas>
                </div>
            </div>
            
            <div class="ADM-card">
                <h3 class="ADM-hdr">Log Expense</h3>
                <div class="ADM-row"><span>🛒</span><input type="text" id="fExpDesc" placeholder="Description..."></div>
                <div class="ADM-row">
                    <span>🏷️</span>
                    <select id="fExpCat">
                        <option value="Fuel">⛽ Fuel</option>
                        <option value="Equipment">🧽 Equipment</option>
                        <option value="Food">🍔 Food</option>
                        <option value="Marketing">📣 Marketing</option>
                        <option value="Other">🏢 Other</option>
                    </select>
                </div>
                <div class="ADM-row"><span>💸</span><input type="number" id="fExpAmt" placeholder="Amount £"></div>
                <button class="ADM-save-btn" onclick="addFinanceExpense()">ADD TRANSACTION</button>
            </div>
            
            <div id="FIN-ledger"></div>
        </section>

        <section id="admin-root" class="tab-content">
            <div class="ADM-card">
                <h3 class="ADM-hdr">App Preferences</h3>
                <div style="border-bottom: 2px solid var(--ios-grey); padding-bottom: 20px; margin-bottom: 15px;">
                    <span style="font-size: 16px; font-weight: 800; color: var(--text); display: block; text-align: center;">Theme Selection</span>
                    <div class="theme-segmented-control">
                        <button id="btnLight" class="segment active" onclick="setThemeMode(false)">☀️ Light</button>
                        <button id="btnDark" class="segment" onclick="setThemeMode(true)">🌙 Dark</button>
                    </div>
                </div>
                <button class="ADM-save-btn" style="margin-top: 0; background: transparent; border: 3px solid var(--accent); color: var(--accent); box-shadow: none;" onclick="location.reload(true)">🔄 SYNC APP UPDATES</button>
            </div>

            <div class="ADM-card">
                <h3 class="ADM-hdr">Customer Database</h3>
                <button class="ADM-save-btn" style="margin-top: 0; box-shadow: 0 10px 25px rgba(0,122,255,0.2);" onclick="openAddCustomerModal()">➕ OPEN CUSTOMER FORM</button>
            </div>

            <div class="ADM-card">
                <h3 class="ADM-hdr">Bank Vault</h3>
                <div class="ADM-row"><span>🏦</span><input type="text" id="bName" placeholder="Account Name"></div>
                <div class="ADM-row"><span>💳</span><input type="text" id="bAcc" placeholder="Account No."></div>
                <button class="ADM-save-btn" style="background:var(--accent);" onclick="saveBank()">🔒 SECURE BANK</button>
            </div>
            
            <div class="ADM-util-vault">
                <button class="ADM-util-btn blue" onclick="exportToQuickBooks()">📊 QUICKBOOKS EXPORT</button>
                <div class="ADM-util-row">
                    <button class="ADM-util-btn grey" onclick="exportData()">📤 Backup</button>
                    <button class="ADM-util-btn grey" onclick="document.getElementById('importFile').click()">📥 Restore</button>
                    <input type="file" id="importFile" hidden onchange="importData(event)" accept=".json">
                </div>
                <button class="ADM-util-btn green" onclick="completeCycle()">🚀 START NEW MONTH</button>
                <button class="ADM-util-btn red" onclick="nuclearReset()">☢️ FACTORY RESET</button>
                <footer id="G-FOOTER">HYDRO PRO // v62.4 ENTERPRISE PWA</footer>
            </div>
        </section>

    </main>

    <nav id="BOTTOM-NAV">
        <button class="nav-item active" onclick="openTab('weeks-root', this)"><span class="nav-icon">📅</span><small>Weeks</small></button>
        <button class="nav-item" onclick="openTab('master-root', this)"><span class="nav-icon">👥</span><small>Custs</small></button>
        <button class="nav-item" onclick="openTab('weather-root', this)"><span class="nav-icon">🌤️</span><small>Weather</small></button>
        <button class="nav-item" onclick="openTab('finances-root', this)"><span class="nav-icon">💰</span><small>Finances</small></button>
        <button class="nav-item" onclick="openTab('admin-root', this)"><span class="nav-icon">⚙️</span><small>Admin</small></button>
    </nav>

    <div id="addCustomerModal" class="modal-overlay hidden" onclick="closeAddCustomerModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="CMD-header">
                <h2>Add Customer</h2>
                <div class="CMD-header-sub">Enter client details below</div>
            </div>
            <div class="ADM-row"><span>👤</span><input type="text" id="cName" placeholder="Full Name"></div>
            <div class="ADM-row"><span>🏠</span><input type="text" id="cHouseNum" placeholder="House No."></div>
            <div class="ADM-row"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street Name"></div>
            <div class="ADM-row"><span>📍</span><input type="text" id="cPostcode" placeholder="Postcode"></div>
            <div class="ADM-row"><span>📞</span><input type="tel" id="cPhone" placeholder="Phone Number"></div>
            <div class="ADM-row"><span>💰</span><input type="number" id="cPrice" placeholder="Price £"></div>
            
            <div class="ADM-row" style="border-bottom:none; height: auto!important; align-items: flex-start; padding-top: 15px;">
                <span style="margin-top: 2px;">📝</span>
                <textarea id="cNotes" placeholder="Additional Notes (e.g. Beware of dog, side gate code...)" rows="3"></textarea>
            </div>
            
            <div class="CMD-action-grid" style="grid-template-columns: 1fr 1fr; margin-top: 20px;">
                <button class="ADM-save-btn" style="margin-top:0; background: var(--ios-grey); color: var(--text); box-shadow: none;" onclick="closeAddCustomerModal()">CANCEL</button>
                <button class="ADM-save-btn" style="margin-top:0;" onclick="saveCustomer()">SAVE</button>
            </div>
        </div>
    </div>

    <div id="briefingModal" class="modal-overlay hidden" onclick="closeBriefing()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="briefingData"></div>
            <button class="ADM-save-btn" style="margin-top:25px; background: var(--ios-grey); color: var(--text); box-shadow: none;" onclick="closeBriefing()">CLOSE</button>
        </div>
    </div>

    <div id="paymentModal" class="modal-overlay hidden" onclick="closePaymentModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="CMD-header" style="border-bottom: none; text-align: center;">
                <div class="CMD-header-sub" style="margin-bottom: 5px; color: var(--success);">SECURE CHECKOUT</div>
                <h2 id="pay-name" style="font-size: 26px;">Customer Name</h2>
            </div>

            <div id="pay-arrears-box" class="CMD-alert-danger" style="margin-top: 0;"></div>

            <button id="pay-full-btn" class="ADM-save-btn" style="background: var(--success); margin-top: 5px; margin-bottom: 25px;" onclick="processPayment('full')">PAY IN FULL</button>

            <div class="ADM-card" style="margin: 0; padding: 20px; border-radius: 25px; box-shadow: none!important; border: 2px solid var(--ios-grey);">
                <div style="font-size: 11px; font-weight: 900; opacity: 0.5; text-transform: uppercase; margin-bottom: 10px; text-align: center;">Or Enter Custom Amount</div>
                <div class="ADM-row" style="border: none; height: 60px!important; margin-bottom: 15px; justify-content: center;">
                    <span style="font-size: 26px; font-weight: 900; color: var(--text); width: auto;">£</span>
                    <input type="number" id="pay-custom-amt" placeholder="0.00" style="font-size: 32px; font-weight: 950; text-align: center; color: var(--text); width: 120px; flex: none;">
                </div>
                <button class="ADM-save-btn" style="height: 60px!important; font-size: 16px; margin-top: 0; background: var(--text); color: var(--bg);" onclick="processPayment('custom')">APPLY PARTIAL PAYMENT</button>
            </div>

            <button class="ADM-save-btn" style="margin-top:20px; background: transparent; border: 3px solid var(--ios-grey); color: var(--text); box-shadow: none;" onclick="closePaymentModal()">CANCEL</button>
        </div>
    </div>

    <script src="app.js?v=624" defer></script>
</body>
</html>
