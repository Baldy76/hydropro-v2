<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v34.1</title>
    <link rel="stylesheet" href="styles.css?v=341">
</head>
<body class="light-mode">

    <header id="global-shield">
        <div class="header-nav-top">
            <div class="logo-container">
                <img src="Logo.png" id="mainLogo" alt="HydroPro">
            </div>
            <div class="theme-container">
                <label class="theme-slider">
                    <input type="checkbox" id="themeCheckbox">
                    <span class="slider-round"></span>
                </label>
            </div>
        </div>
        <div class="header-text">
            <span id="greetText"></span>
            <span id="dateText"></span>
        </div>
    </header>

    <main id="app-viewport">
        <section id="home-root" class="tab-content active">
            <div class="main-hub-grid">
                <button class="hub-tile" onclick="openTab('setup-root')"><span>✨</span><small>Setup</small></button>
                <button class="hub-tile" onclick="openTab('master-root')"><span>👥</span><small>Custs</small></button>
                <button class="hub-tile" onclick="openTab('stats-root')"><span>📊</span><small>Stats</small></button>
                <button class="hub-tile" onclick="openTab('ledger-root')"><span>💸</span><small>Ledger</small></button>
                <button class="hub-tile tile-full" onclick="openTab('weeks-root')"><span>📅</span><small>Weekly Work</small></button>
            </div>
        </section>

        <section id="master-root" class="tab-content">
            <button class="btn-back-global" onclick="openTab('home-root')">🏠 Home</button>
            <div class="search-container">
                <input type="text" id="mainSearch" placeholder="🔍 Search customers..." oninput="renderMaster()">
            </div>
            <div id="master-list-container"></div>
        </section>

        <section id="setup-root" class="tab-content">
            <button class="btn-back-global" onclick="openTab('home-root')">🏠 Home</button>
            <div class="content-card">
                <input type="hidden" id="editId">
                <div class="form-row"><span>👤</span><input type="text" id="cName" placeholder="Name"></div>
                <div class="form-row"><span>📱</span><input type="tel" id="cPhone" placeholder="Phone"></div>
                <div class="form-row"><span>🏠</span><input type="text" id="cHouseNum" placeholder="House No."></div>
                <div class="form-row"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street"></div>
                <div class="form-row"><span>📍</span><input type="text" id="cPostcode" placeholder="Postcode"></div>
                <div class="form-row"><span>💰</span><input type="number" id="cPrice" placeholder="Price £"></div>
                <textarea id="cNotes" placeholder="Private Customer Notes..."></textarea>
                <button class="btn-action-primary" onclick="saveCustomer()">✨ Save Customer</button>
            </div>
            
            <div class="vault-card">
                <div class="vault-header">
                    <h3>🏦 Bank Vault</h3>
                    <div class="vault-actions">
                        <button id="copyBankBtn" class="btn-vault vault-copy" onclick="copyBankDetails()">📋 COPY</button>
                        <button id="bankLockBtn" class="btn-vault vault-lock" onclick="toggleBankLock()">🔓 UNLOCK</button>
                    </div>
                </div>
                <div class="vault-inputs">
                    <input type="text" id="bankName" class="bank-field" readonly placeholder="Account Name">
                    <input type="text" id="bankSort" class="bank-field" readonly placeholder="Sort Code">
                    <input type="text" id="bankAcc" class="bank-field" readonly placeholder="Account Number">
                    <button id="bankSaveBtn" class="hidden btn-action-primary" style="background:var(--success); margin-top:10px;" onclick="saveBankDetails()">💾 Save Bank Info</button>
                </div>
            </div>

            <div class="reset-container">
                <button class="btn-danger-large" onclick="completeCycle()">🚀 START NEW MONTH</button>
            </div>
        </section>

        <section id="ledger-root" class="tab-content">
            <button class="btn-back-global" onclick="openTab('home-root')">🏠 Home</button>
            <div class="ledger-hero">
                <small>MONTH SPEND</small>
                <div id="ledgerTotalDisplay">£0.00</div>
            </div>
            <div class="ledger-input-card">
                <input type="text" id="expDesc" placeholder="Description">
                <input type="number" id="expAmt" placeholder="Amount £">
                <button id="ledgerAddBtn" onclick="addExpense()">Add Expense</button>
            </div>
            <div class="csv-action-row">
                <button onclick="exportCSV('income')">💹 Income CSV</button>
                <button onclick="exportCSV('spend')">📋 Spend CSV</button>
            </div>
            <div id="ledger-list-container"></div>
        </section>

        <section id="stats-root" class="tab-content">
            <button class="btn-back-global" onclick="openTab('home-root')">🏠 Home</button>
            <div id="stats-container"></div>
        </section>

        <section id="weeks-root" class="tab-content">
            <button class="btn-back-global" onclick="openTab('home-root')">🏠 Home</button>
            <div class="weeks-grid-master">
                <button class="week-tile" onclick="viewWeek(1)">Week 1</button>
                <button class="week-tile" onclick="viewWeek(2)">Week 2</button>
                <button class="week-tile" onclick="viewWeek(3)">Week 3</button>
                <button class="week-tile" onclick="viewWeek(4)">Week 4</button>
                <button class="week-tile week-tile-full" onclick="viewWeek(5)">Week 5</button>
            </div>
        </section>

        <section id="week-view-root" class="tab-content">
            <div class="nav-spread-row">
                <button onclick="openTab('weeks-root')">⬅️ Back</button>
                <button onclick="openTab('home-root')">🏠 Home</button>
            </div>
            <div id="bulk-box" class="bulk-container"></div>
            <div id="week-list-container"></div>
        </section>
    </main>

    <div id="msgModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Send Invoice?</h3>
            <p id="msgPreview"></p>
            <div id="modalButtons"></div>
        </div>
    </div>

    <div id="briefingModal" class="modal-overlay hidden" onclick="closeBriefing()">
        <div class="modal-content briefing-box" onclick="event.stopPropagation()">
            <div id="briefingData"></div>
            <div class="briefing-footer">
                <button class="btn-brief-edit" id="briefEditBtn">⚙️ Edit Customer Info</button>
                <button class="btn-brief-close" onclick="closeBriefing()">CLOSE</button>
            </div>
        </div>
    </div>

    <footer id="version-label">v34.1</footer>

    <script src="app.js?v=341"></script>
</body>
</html>
