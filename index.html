<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v21.8</title>
    <link rel="stylesheet" href="styles.css?v=218">
</head>
<body class="light-mode">

    <div class="mode-switch-wrapper">
        <label class="ios-switch">
            <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
            <span class="slider"></span>
        </label>
    </div>

    <header id="branding-shield">
        <img src="Logo.png" class="logo-img" alt="Hydro Pro">
        <div class="home-hero">
            <div id="greetingMsg" class="home-greeting">Good Morning, Partner! ☕</div>
            <div id="headerDate" class="home-date"></div>
        </div>
    </header>

    <div id="globalNav" class="subpage-nav hidden">
        <button class="back-pill" onclick="openTab('home')">🏠 Back to Home</button>
    </div>

    <div id="actionModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="modalCustomerName" class="modal-title-locked"></div>
            <p id="modalCustomerAddress" class="modal-sub-locked"></p>
            <div class="modal-action-grid">
                <button class="modal-btn btn-edit" id="modalEditBtn">✏️ Edit Details</button>
                <button class="modal-btn btn-cancel" onclick="closeModal()">❌ Return to List</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        
        <div id="home" class="tab-content active">
            <div class="home-grid">
                <button class="tile tile-admin" onclick="openTab('admin')"><span>✨</span><small>Setup</small></button>
                <button class="tile tile-admin" onclick="openTab('master')"><span>👥</span><small>Custs</small></button>
                <button class="tile tile-admin" onclick="openTab('stats')"><span>📊</span><small>Stats</small></button>
                <button class="tile tile-admin" onclick="openTab('spend')"><span>💸</span><small>Ledger</small></button>
                <button class="tile tile-weekly-hub" onclick="openTab('weeksHub')"><span>📅</span><small>Weekly Work</small></button>
            </div>
        </div>

        <div id="admin" class="tab-content">
            <div class="card creative-form-card">
                <h3 class="setup-section-label">👤 Add/Edit Customer</h3>
                <input type="hidden" id="editId">
                <div class="fun-input-group"><div class="fun-icon">👤</div><div class="fun-field-stack"><label>Name</label><input type="text" id="cName" class="creative-input"></div></div>
                <div class="fun-input-group"><div class="fun-icon">📱</div><div class="fun-field-stack"><label>Phone</label><input type="tel" id="cPhone" class="creative-input"></div></div>
                <div class="fun-input-group"><div class="fun-icon">🏠</div><div class="fun-field-stack"><label>House No.</label><input type="text" id="cHouseNum" class="creative-input"></div></div>
                <div class="fun-input-group"><div class="fun-icon">🛣️</div><div class="fun-field-stack"><label>Street</label><input type="text" id="cStreet" class="creative-input"></div></div>
                <div class="fun-input-group"><div class="fun-icon">📍</div><div class="fun-field-stack"><label>Postcode</label><input type="text" id="cPostcode" class="creative-input"></div></div>
                <div class="fun-input-group"><div class="fun-icon">💰</div><div class="fun-field-stack"><label>Price £</label><input type="number" id="cPrice" class="creative-input"></div></div>
                <div class="fun-input-group" style="border:none"><div class="fun-icon">📝</div><div class="fun-field-stack"><label>Notes</label><textarea id="cNotes" class="creative-textarea"></textarea></div></div>
                <button class="creative-save-btn" onclick="saveCustomer()">✨ Save Customer</button>
            </div>

            <div class="card creative-form-card bank-vault-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 class="setup-section-label" style="margin:0">🏦 Bank Details</h3>
                    <button id="bankLockBtn" class="bank-toggle-btn" onclick="toggleBankLock()">🔓 Unlock</button>
                </div>
                
                <div class="fun-input-group">
                    <div class="fun-icon" style="background:rgba(52,199,89,0.1)">🏷️</div>
                    <div class="fun-field-stack"><label>Account Name</label><input type="text" id="bankName" class="creative-input bank-field" readonly></div>
                </div>
                <div class="fun-input-group">
                    <div class="fun-icon" style="background:rgba(175,82,222,0.1)">🔢</div>
                    <div class="fun-field-stack"><label>Sort Code</label><input type="text" id="bankSort" class="creative-input bank-field" readonly maxlength="8" placeholder="00-00-00"></div>
                </div>
                <div class="fun-input-group" style="border:none">
                    <div class="fun-icon" style="background:rgba(255,149,0,0.1)">💳</div>
                    <div class="fun-field-stack"><label>Account Number</label><input type="number" id="bankAcc" class="creative-input bank-field" readonly></div>
                </div>
                
                <button id="bankSaveBtn" class="creative-save-btn hidden" onclick="saveBankDetails()" style="background:var(--success); margin-top:15px;">💾 Save Bank Details</button>
            </div>
        </div>

        <div id="weeksHub" class="tab-content">
            <div class="weeks-grid-lock">
                <button class="tile-premium-week" onclick="openTab('week1')">Week 1</button>
                <button class="tile-premium-week" onclick="openTab('week2')">Week 2</button>
                <button class="tile-premium-week" onclick="openTab('week3')">Week 3</button>
                <button class="tile-premium-week" onclick="openTab('week4')">Week 4</button>
                <button class="tile-premium-week tile-week-full" onclick="openTab('week5')">Week 5</button>
            </div>
        </div>

        <div id="week1" class="tab-content"></div><div id="week2" class="tab-content"></div><div id="week3" class="tab-content"></div><div id="week4" class="tab-content"></div><div id="week5" class="tab-content"></div>
        <div id="master" class="tab-content">...</div>
        <div id="stats" class="tab-content">...</div>
        <div id="spend" class="tab-content">...</div>
    </div>

    <div class="page-version-footer">v21.8 - Bank Details Vault Active</div>
    <script src="app.js?v=218"></script>
</body>
</html>
