<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="AppIcon.png">
    <link rel="icon" type="image/png" href="AppIcon.png">
    <link rel="stylesheet" href="styles.css?v=383">
</head>
<body class="light-mode">

    <div id="receipt-zone" class="hidden-print"></div>

    <header id="G-HEADER" class="no-print">
        <div class="G-LOGO-WRAP"><img src="Logo.png" id="mainLogo" alt="HydroPro"></div>
        <div class="G-NAV-ZONE">
            <span id="dateText"></span>
            <div id="weather-pill" class="G-WEATHER-PILL" onclick="launchWeatherApp()">
                <span id="w-icon">🌤️</span><small id="w-text">Syncing...</small>
            </div>
            <div class="G-SWITCH-WRAP">
                <label class="ios-switch">
                    <input type="checkbox" id="themeCheckbox">
                    <span class="ios-slider"></span>
                    <span class="ios-slider-label-light">LIGHT</span>
                </label>
            </div>
        </div>
    </header>

    <main id="G-VIEWPORT" class="no-print">
        <section id="home-root" class="tab-content active">
            <div class="HM-GRID">
                <button onclick="openTab('setup-root')"><span>✨</span><small>Setup</small></button>
                <button onclick="openTab('master-root')"><span>👥</span><small>Custs</small></button>
                <button onclick="openTab('stats-root')"><span>📊</span><small>Stats</small></button>
                <button onclick="openTab('ledger-root')"><span>💸</span><small>Ledger</small></button>
                <button class="HM-FULL" onclick="openTab('weeks-root')"><span>📅</span><small>Weekly Work</small></button>
            </div>
            <div class="HM-SYNC-ZONE"><button class="HM-SYNC-BTN" onclick="location.reload(true)">🔄 Sync Updates</button></div>
        </section>

        <section id="master-root" class="tab-content">
            <button class="BACK-BTN" onclick="openTab('home-root')">🏠 Home</button>
            <div class="CT-SEARCH-WRAP"><input type="text" id="mainSearch" placeholder="🔍 Search..." oninput="renderMaster()"></div>
            <div id="master-list-container"></div>
        </section>

        <section id="setup-root" class="tab-content">
            <button class="BACK-BTN" onclick="openTab('home-root')">🏠 Home</button>
            <div class="SU-CARD">
                <input type="hidden" id="editId">
                <div class="SU-ROW"><span>👤</span><input type="text" id="cName" placeholder="Name"></div>
                <div class="SU-ROW"><span>📱</span><input type="tel" id="cPhone" placeholder="Phone"></div>
                <div class="SU-ROW"><span>🏠</span><input type="text" id="cHouseNum" placeholder="House No."></div>
                <div class="SU-ROW"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street"></div>
                <div class="SU-ROW"><span>📍</span><input type="text" id="cPostcode" placeholder="Postcode"></div>
                <div class="SU-ROW"><span>📅</span>
                    <select id="cDay" class="SU-SELECT">
                        <option value="Mon">Monday</option><option value="Tue">Tuesday</option>
                        <option value="Wed">Wednesday</option><option value="Thu">Thursday</option>
                        <option value="Fri">Friday</option><option value="Sat">Saturday</option>
                        <option value="Sun">Sunday</option>
                    </select>
                </div>
                <div class="SU-ROW"><span>📅</span>
                    <select id="cWeek" class="SU-SELECT">
                        <option value="1">Week 1</option><option value="2">Week 2</option>
                        <option value="3">Week 3</option><option value="4">Week 4</option>
                        <option value="5">Week 5</option>
                    </select>
                </div>
                <div class="SU-ROW"><span>💰</span><input type="number" id="cPrice" placeholder="Price £"></div>
                <textarea id="cNotes" class="SU-NOTES" placeholder="Private Notes..."></textarea>
                <button class="SU-SAVE-BTN" onclick="saveCustomer()">✨ Save Customer</button>
            </div>
            <div class="SU-ADMIN-ZONE">
                <button class="SU-RESET-BTN" onclick="completeCycle()">🚀 START NEW MONTH</button>
                <div class="SU-BACKUP-ROW">
                    <button class="SU-IO-BTN" onclick="exportData()">📤 Backup CSV</button>
                    <button class="SU-IO-BTN" onclick="document.getElementById('importFile').click()">📥 Restore CSV</button>
                    <input type="file" id="importFile" hidden onchange="importData(event)" accept=".csv">
                </div>
                <button class="SU-DANGER-BTN" onclick="nuclearReset()">⚠️ FACTORY RESET DATA</button>
            </div>
        </section>

        <section id="stats-root" class="tab-content"><button class="BACK-BTN" onclick="openTab('home-root')">🏠 Home</button><div id="stats-container"></div></section>
        <section id="ledger-root" class="tab-content"><button class="BACK-BTN" onclick="openTab('home-root')">🏠 Home</button><div class="LD-HERO"><small>MONTH SPEND</small><div id="ledgerTotalDisplay">£0.00</div></div><div id="ledger-list-container"></div></section>

        <section id="weeks-root" class="tab-content">
            <button class="BACK-BTN" onclick="openTab('home-root')">🏠 Home</button>
            <div class="WK-HUB-GRID">
                <button class="WK-TILE" onclick="viewWeek(1)">Week 1</button>
                <button class="WK-TILE" onclick="viewWeek(2)">Week 2</button>
                <button class="WK-TILE" onclick="viewWeek(3)">Week 3</button>
                <button class="WK-TILE" onclick="viewWeek(4)">Week 4</button>
                <button class="WK-TILE WK-FULL" onclick="viewWeek(5)">Week 5</button>
            </div>
        </section>

        <section id="week-view-root" class="tab-content">
            <div class="WK-NAV-ROW"><button onclick="openTab('weeks-root')">⬅️ Weeks</button><button onclick="openTab('home-root')">🏠 Home</button></div>
            <div class="WK-DAY-PICKER">
                <button class="DAY-BTN active" onclick="setWorkingDay('Mon', this)">M</button>
                <button class="DAY-BTN" onclick="setWorkingDay('Tue', this)">T</button>
                <button class="DAY-BTN" onclick="setWorkingDay('Wed', this)">W</button>
                <button class="DAY-BTN" onclick="setWorkingDay('Thu', this)">T</button>
                <button class="DAY-BTN" onclick="setWorkingDay('Fri', this)">F</button>
                <button class="DAY-BTN" onclick="setWorkingDay('Sat', this)">S</button>
                <button class="DAY-BTN" onclick="setWorkingDay('Sun', this)">S</button>
            </div>
            <div id="week-list-container"></div>
        </section>
    </main>

    <div id="briefingModal" class="modal-overlay hidden" onclick="closeBriefing()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="briefingData"></div>
            <div id="quickSettleContainer"></div>
            <div id="receiptButtonContainer"></div> <button class="MD-EDIT" id="briefEditBtn">⚙️ Edit Info</button>
            <button class="MD-CLOSE" onclick="closeBriefing()">CLOSE</button>
        </div>
    </div>
    
    <footer id="version-label" class="no-print">v38.3 GOLD</footer>
    <script src="app.js?v=383"></script>
</body>
</html>
