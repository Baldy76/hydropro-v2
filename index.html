<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v43.6</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="styles.css?v=436">
</head>
<body class="light-mode">

    <header id="G-HEADER">
        <div class="G-LOGO-WRAP"><img src="Logo.png" id="mainLogo" alt="HydroPro"></div>
        <div class="CENTRAL-STATUS-POD">
            <div id="weather-pill" class="G-WEATHER-PILL" onclick="launchWeatherApp()">
                <span id="w-icon">🌤️</span><small id="w-text">SYNC...</small>
            </div>
            <div class="G-SWITCH-WRAP">
                <span class="MODE-LABEL">LIT</span>
                <label class="ios-switch">
                    <input type="checkbox" id="themeCheckbox">
                    <span class="ios-slider"></span>
                </label>
                <span class="MODE-LABEL">DRK</span>
            </div>
        </div>
        <div class="DATE-CONTAINER"><span id="dateText"></span></div>
    </header>

    <main id="G-VIEWPORT">
        <section id="home-root" class="tab-content active">
            <div class="HUB-LOCK-CONTAINER">
                <div class="GRID-ROW">
                    <button class="BLOCK-BTN" onclick="openTab('admin-root')"><span class="I-LOCK">⚙️</span><small class="T-LOCK">Admin</small></button>
                    <button class="BLOCK-BTN" onclick="openTab('master-root')"><span class="I-LOCK">👥</span><small class="T-LOCK">Custs</small></button>
                </div>
                <div class="GRID-ROW">
                    <button class="BLOCK-BTN" onclick="openTab('finances-root')"><span class="I-LOCK">💰</span><small class="T-LOCK">Finances</small></button>
                    <button class="BLOCK-BTN" onclick="openTab('weeks-root')"><span class="I-LOCK">📅</span><small class="T-LOCK">Weeks</small></button>
                </div>
            </div>
            <div class="SYNC-AREA">
                <button class="SYNC-BTN-LOCKED" onclick="location.reload(true)">🔄 SYNC UPDATES</button>
            </div>
        </section>

        <section id="master-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="CONCRETE-SEARCH-VAULT">
                <input type="text" id="mainSearch" placeholder="🔍 Search Name or Street..." oninput="renderMaster()">
            </div>
            <div id="master-list-container"></div>
        </section>

        <section id="admin-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="VAULT-CARD">
                <h3 class="VAULT-HDR">Quick Add Customer</h3>
                <div class="VAULT-ROW"><span>👤</span><input type="text" id="cName" placeholder="Name"></div>
                <div class="VAULT-ROW"><span>🏠</span><input type="text" id="cHouseNum" placeholder="No."></div>
                <div class="VAULT-ROW"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street"></div>
                <div class="VAULT-ROW"><span>💰</span><input type="number" id="cPrice" placeholder="Price £"></div>
                <textarea id="cNotes" class="VAULT-NOTES-XL" placeholder="Notes..."></textarea>
                <button class="VAULT-SAVE-BTN" onclick="saveCustomer()">✨ SAVE CUSTOMER</button>
            </div>
            <div class="VAULT-CARD">
                <h3 class="VAULT-HDR">Business Bank Details</h3>
                <div class="VAULT-ROW"><span>🏦</span><input type="text" id="bName" placeholder="Account Name"></div>
                <div class="VAULT-ROW"><span>🔢</span><input type="text" id="bSort" placeholder="Sort Code"></div>
                <div class="VAULT-ROW"><span>💳</span><input type="text" id="bAcc" placeholder="Account Number"></div>
                <button class="VAULT-SAVE-BTN" style="background:var(--accent); margin-top:20px;" onclick="saveBank()">🔒 SECURE BANK INFO</button>
            </div>
        </section>

        <section id="finances-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div id="finances-dashboard-container"></div>
            <div id="finances-statement-container"></div>
        </section>
    </main>

    <footer id="G-FOOTER">v43.6 REINFORCED VAULT</footer>
    <script src="app.js?v=436"></script>
</body>
</html>
