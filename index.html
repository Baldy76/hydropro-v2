<div id="admin" class="tab-content">
    <div class="card ios-form-card">
        <h3 class="section-title">✨ Add New Client</h3>
        <input type="hidden" id="editId">
        
        <div class="input-group">
            <label class="ios-label">Full Name</label>
            <input type="text" id="cName" placeholder="e.g. John Doe" class="ios-input">
        </div>

        <div class="input-group">
            <label class="ios-label">House Number / Name</label>
            <input type="text" id="cHouseNum" placeholder="e.g. 22b" class="ios-input">
        </div>

        <div class="input-group">
            <label class="ios-label">Street Name</label>
            <input type="text" id="cStreet" placeholder="e.g. High Street" class="ios-input">
        </div>

        <div class="input-group">
            <label class="ios-label">Postcode</label>
            <input type="text" id="cPostcode" placeholder="e.g. NE1 1AA" class="ios-input">
        </div>

        <div class="input-group">
            <label class="ios-label">Mobile Number</label>
            <input type="tel" id="cPhone" placeholder="07123 456789" class="ios-input">
        </div>

        <div class="input-group">
            <label class="ios-label">Price (£)</label>
            <input type="number" id="cPrice" placeholder="0.00" class="ios-input">
        </div>

        <div class="grid-1x2">
            <div class="input-group">
                <label class="ios-label">Week</label>
                <select id="cWeek" class="ios-select">
                    <option value="1">Week 1</option>
                    <option value="2">Week 2</option>
                    <option value="3">Week 3</option>
                    <option value="4">Week 4</option>
                    <option value="5">Week 5</option>
                </select>
            </div>
            <div class="input-group">
                <label class="ios-label">Day</label>
                <select id="cDay" class="ios-select">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label class="ios-label">Notes</label>
            <textarea id="cNotes" placeholder="Access codes, dog info, etc..." class="ios-textarea"></textarea>
        </div>

        <button class="btn-main full-width-btn bounce-on-tap" onclick="saveCustomer()">💾 Save Customer</button>
    </div>

    <div class="card action-card-green">
        <button class="btn-clear full-width-btn" onclick="completeCycle()">🚀 START NEW MONTH</button>
    </div>
    <div class="page-version-footer">v13.7 - iOS Design</div>
</div>
