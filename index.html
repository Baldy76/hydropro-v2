<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v31.8</title>
    <link rel="stylesheet" href="styles.css?v=318">
</head>
<body class="light-mode">

    <header id="global-shield">
        <div class="nav-container-transparent">
            <div class="logo-wrap-surgical-expansion">
                <img src="Logo.png" id="mainLogo" class="logo-fluid-surgical" alt="HydroPro">
            </div>
            <div class="toggle-wrap-surgical">
                <label class="theme-slider">
                    <input type="checkbox" id="themeCheckbox">
                    <span class="slider-round"></span>
                </label>
            </div>
        </div>
        <div class="header-greet">
            <span id="greetText"></span>
            <span id="dateText"></span>
        </div>
    </header>

    <div id="app-viewport">
        <section id="home-root" class="tab-content active">
            <div class="home-grid">
                <button class="airgap-btn" onclick="openTab('setup-root')"><span class="icon-blue-tint">✨</span><small>Setup</small></button>
                <button class="airgap-btn" onclick="openTab('master-root')"><span class="icon-blue-tint">👥</span><small>Custs</small></button>
                <button class="airgap-btn" onclick="openTab('stats-root')"><span class="icon-blue-tint">📊</span><small>Stats</small></button>
                <button class="airgap-btn" onclick="openTab('ledger-root')"><span class="icon-blue-tint">💸</span><small>Ledger</small></button>
                <button class="full-tile airgap-btn" onclick="openTab('weeks-root')"><span>📅</span><small>Weekly Work</small></button>
            </div>
        </section>

        <section id="master-root" class="tab-content">
            <button class="nav-back airgap-btn" onclick="openTab('home-root')">🏠 Home</button>
            <div class="search-box-surgical airgap-card">
                <input type="text" id="mainSearch" placeholder="🔍 Search customers..." oninput="renderMaster()">
            </div>
            <div id="master-list-container"></div>
        </section>

        <section id="setup-root" class="tab-content">
            <button class="nav-back airgap-btn" onclick="openTab('home-root')">🏠 Home</button>
            <div class="setup-card airgap-card">
                <input type="hidden" id="editId">
                <div class="setup-row"><span>👤</span><input type="text" id="cName" placeholder="Name"></div>
                <div class="setup-row"><span>📱</span><input type="tel" id="cPhone" placeholder="Phone"></div>
                <div class="setup-row"><span>🏠</span><input type="text" id="cHouseNum" placeholder="House No."></div>
                <div class="setup-row"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street"></div>
                <div class="setup-row"><span>📍</span><input type="text" id="cPostcode" placeholder="Postcode"></div>
                <div class="setup-row"><span>💰</span><input type="number" id="cPrice" placeholder="Price £"></div>
                <textarea id="cNotes" placeholder="Private Notes..."></textarea>
                <button class="setup-save-btn airgap-btn" onclick="saveCustomer()">✨ Save Customer</button>
            </div>
            
            <div class="bank-vault airgap-card">
                <div class="vault-header"><h3>🏦 Bank Vault</h3>
                    <div class="vault-button-stack">
                        <button id="copyBankBtn" class="vault-btn vault-copy" onclick="copyBankDetails()">📋 COPY</button>
                        <button id="bankLockBtn" class="vault-btn vault-unlock" onclick="toggleBankLock()">🔓 UNLOCK</button>
                    </div>
                </div>
                <input type="text" id="bankName" class="bank-field bank-top-gap" readonly placeholder="Account Name">
                <input type="text" id="bankSort" class="bank-field" readonly placeholder="Sort Code">
                <input type="text" id="bankAcc" class="bank-field" readonly placeholder="Account Number">
                <button id="bankSaveBtn" class="hidden setup-save-btn" onclick="saveBankDetails()">💾 Save Bank Info</button>
            </div>

            <div class="reset-area airgap-card">
                <button class="btn-reset" onclick="completeCycle()">🚀 START NEW MONTH</button>
            </div>
        </section>

        <section id="ledger-root" class="tab-content">
            <button class="nav-back airgap-btn" onclick="openTab('home-root')">🏠 Home</button>
            <div class="ledger-hero airgap-card"><small>MONTH SPEND</small><div id="ledgerTotalDisplay">£0.00</div></div>
            <div class="ledger-input-card airgap-card">
                <input type="text" id="expDesc" placeholder="Description">
                <input type="number" id="expAmt" placeholder="Amount £">
                <button onclick="addExpense()">Add Expense</button>
            </div>
            <div class="ledger-csv-row airgap-card">
                <button onclick="exportCSV('income')">💹 Income CSV</button>
                <button onclick="exportCSV('spend')">📋 Spend CSV</button>
            </div>
            <div id="ledger-list-container"></div>
        </section>

        <section id="stats-root" class="tab-content">
            <button class="nav-back airgap-btn" onclick="openTab('home-root')">🏠 Home</button>
            <div id="stats-container" style="padding: 0 20px;"></div>
        </section>

        <section id="weeks-root" class="tab-content">
            <button class="nav-back airgap-btn" onclick="openTab('home-root')">🏠 Home</button>
            <div class="weeks-grid">
                <button class="airgap-btn" onclick="viewWeek(1)">Week 1</button>
                <button class="airgap-btn" onclick="viewWeek(2)">Week 2</button>
                <button class="airgap-btn" onclick="viewWeek(3)">Week 3</button>
                <button class="airgap-btn" onclick="viewWeek(4)">Week 4</button>
                <button class="full airgap-btn" onclick="viewWeek(5)">Week 5</button>
            </div>
        </section>

        <section id="week-view-root" class="tab-content">
            <div class="week-nav-row airgap-card">
                <button class="nav-half" onclick="openTab('weeks-root')">⬅️ Back</button>
                <button class="nav-half" onclick="openTab('home-root')">🏠 Home</button>
            </div>
            <div id="bulk-box" class="airgap-card"></div>
            <div id="week-list-container"></div>
        </section>
    </div>

    <footer id="global-version-footer">v31.8 - Master List Rebuilt</footer>

    <div id="msgModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Send Invoice?</h3>
            <p id="msgPreview"></p>
            <div id="modalButtons"></div>
        </div>
    </div>

    <script src="app.js?v=318"></script>
</body>
</html>
