<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hydro Pro - Gold Master</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="toastContainer" class="toast-container"></div>

    <div class="sticky-header">
        <div class="header-top">
            <div class="brand-container">
                <img src="logo.png" id="mainLogo" class="logo-img" alt="Hydro Logo" onerror="this.style.display='none'; document.getElementById('textLogo').style.display='block';">
                <h1 id="textLogo" class="brand-title" style="display:none;">Hydro Pro</h1>
            </div>
            <div class="mode-switch-wrapper">
                <label class="ios-switch">
                    <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="openTab(event, 'admin')">Setup</button>
            <button class="tab" onclick="openTab(event, 'master')">Custs</button>
            <button class="tab" onclick="openTab(event, 'stats')">Stats</button>
            <button class="tab" onclick="openTab(event, 'spend')">Spend</button>
            <button class="tab" onclick="openTab(event, 'week1')">W1</button>
            <button class="tab" onclick="openTab(event, 'week2')">W2</button>
            <button class="tab" onclick="openTab(event, 'week3')">W3</button>
            <button class="tab" onclick="openTab(event, 'week4')">W4</button>
        </div>
    </div>

    <div class="main-container">
        <div id="headerDate" class="date-txt">Loading...</div>

        <div id="admin" class="tab-content active">
            <div class="card">
                <h3 style="margin:0 0 15px 0" id="formTitle">Customer Entry</h3>
                <input type="hidden" id="editId">
                <input type="text" id="cName" placeholder="Customer Name" autocomplete="off">
                <input type="text" id="cAddr" placeholder="Address" autocomplete="off">
                <input type="text" id="cPostcode" placeholder="Postcode" autocomplete="off">
                <input type="tel" id="cPhone" placeholder="Mobile Number">
                <input type="number" id="cPrice" placeholder="Price £" pattern="\d*">
                <div class="grid-2">
                    <select id="cWeek">
                        <option value="1">Week 1</option><option value="2">Week 2</option>
                        <option value="3">Week 3</option><option value="4">Week 4</option>
                    </select>
                    <select id="cDay">
                        <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                    </select>
                </div>
                <textarea id="cNotes" placeholder="Notes (Gates, Dogs etc)"></textarea>
                <button class="btn-main" onclick="saveCustomer()">Save Customer</button>
                <button id="btnDeleteCust" class="btn-danger" style="display:none; margin-top:10px;" onclick="deleteCustomer()">🗑 Delete Customer</button>
                <button id="cancelEdit" class="btn-neutral" style="display:none; margin-top:10px;" onclick="clearForm()">Cancel Edit</button>
            </div>

            <div style="height: 25px;"></div>

            <div class="card" style="background: rgba(235, 51, 73, 0.05); border: 2px solid var(--danger);">
                <button class="btn-danger" style="height:65px;" onclick="completeCycle()">🚀 START NEW MONTH</button>
            </div>

            <div class="card">
                <h3 style="margin:0 0 15px 0">Bank Details</h3>
                <button class="btn-alt" id="editBankBtn" onclick="unlockBank()">🔓 Edit Bank Details</button>
                <button id="btnBankSave" class="btn-main" style="display:none; margin-bottom:12px;" onclick="lockAndSaveBank()">🔒 Save & Lock</button>
                <input type="text" id="bName" placeholder="Account Name" disabled>
                <input type="text" id="bSort" placeholder="Sort Code" disabled>
                <input type="text" id="bAcc" placeholder="Account Number" disabled>
            </div>

            <div class="card">
                <div class="grid-2">
                    <button class="btn-export" onclick="exportCSV()">💾 Export</button>
                    <button class="btn-import" onclick="document.getElementById('csvFile').click()">📂 Import</button>
                </div>
                <input type="file" id="csvFile" accept=".csv" onchange="importCSV(event)" style="display:none;">
            </div>

            <div style="margin-top:50px; padding-bottom: 40px;">
                <button type="button" class="btn-uat" onclick="runUATClear()">🛠️ UAT: RESET ALL FINANCES</button>
            </div>
        </div>

        <div id="master" class="tab-content">
            <div class="card" style="padding:0; overflow:hidden;">
                <div style="padding:15px; border-bottom: 1px solid rgba(0,0,0,0.1);">
                    <input type="text" id="mainSearch" placeholder="🔍 Search database..." oninput="handleSearch()" style="margin:0;">
                </div>
                <table style="width:100%; border-collapse:collapse;">
                    <thead><tr class="table-header-row"><th>Customer</th><th style="text-align:right">Owed</th></tr></thead>
                    <tbody id="masterTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="stats" class="tab-content">
            <div class="card">
                <h3 style="text-align:center; margin-bottom:20px;">This Month's Financials</h3>
                <div class="stats-grid">
                    <div class="metric-tile tile-collected"><small>Collected</small><strong id="statCollMonth">£0</strong></div>
                    <div class="metric-tile tile-owed"><small>Owed</small><strong id="statOwedMonth">£0</strong></div>
                    <div class="metric-tile tile-pending"><small>Pending</small><strong id="statPendingMonth">£0</strong></div>
                </div>
                <div class="chart-box" style="margin-top:25px;"><div id="pieMonth" class="pie"></div></div>
                <div id="legendMonth" class="legend"></div>
            </div>
            <div class="card">
                <h3 style="text-align:center; margin-bottom:20px;">Overall Financials</h3>
                <div class="chart-box"><div id="pieOverall" class="pie"></div></div>
                <div id="legendOverall" class="legend"></div>
                <div style="background:var(--history-box); color:white; padding:20px; border-radius:24px; margin-top:20px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>TOTAL REV</span><strong id="statFYTotal">£0</strong></div>
                    <table style="width:100%; border-collapse:collapse; font-size:13px;">
                        <tbody id="quarterlyTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="spend" class="tab-content">
            <div class="card">
                <h3>Log Expense</h3>
                <input type="text" id="expName" placeholder="Item">
                <input type="number" id="expAmount" placeholder="Amount £">
                <button class="btn-main" onclick="addExpense()">Add Expense</button>
            </div>
            <div id="expenseList"></div>
        </div>

        <div id="week1" class="tab-content"></div>
        <div id="week2" class="tab-content"></div>
        <div id="week3" class="tab-content"></div>
        <div id="week4" class="tab-content"></div>
    </div>

    <div id="customerModal" class="modal-overlay" onclick="if(event.target === this) closeCustomerModal()">
        <div class="modal-content">
            <button class="modal-close" onclick="closeCustomerModal()">✖</button>
            <div id="modName" style="font-size:22px; font-weight:900; color:var(--primary);"></div>
            <div class="modal-body">
                <p id="modAddr" style="font-size:14px; opacity:0.7; margin-bottom:15px;"></p>
                <h4 style="margin:15px 0 5px 0; font-size:11px; text-transform:uppercase; letter-spacing:1px; opacity:0.5;">Financial History</h4>
                <div class="history-container">
                    <table id="modHistoryTable" style="width:100%; border-collapse:collapse;"></table>
                </div>
                <div style="margin-top:20px; text-align:right; background:rgba(0,0,0,0.03); padding:15px; border-radius:18px;">
                    <strong style="font-size:11px; opacity:0.6;">TOTAL OUTSTANDING:</strong><br>
                    <span id="modOwed" style="font-size:24px; font-weight:900;"></span>
                </div>
                <button class="btn-alt" style="margin-top:20px; background:var(--neutral);" onclick="editFromModal()">⚙️ Edit Details</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
