<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Hydro Pro v11.8</title>
    <link rel="stylesheet" href="styles.css?v=118">
</head>
<body class="light-mode">

    <div class="sticky-header">
        <div class="header-top">
            <img src="Logo.png" class="logo-img" alt="Hydro Pro Logo">
            <div class="mode-switch-wrapper">
                <label class="ios-switch">
                    <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="date-container">
            <div id="headerDate" class="date-txt"></div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="openTab(event, 'admin')">Setup</button>
            <button class="tab" onclick="openTab(event, 'master')">Custs</button>
            <button class="tab" onclick="openTab(event, 'stats')">Stats</button>
            <button class="tab" onclick="openTab(event, 'spend')">Spend</button>
            <button class="tab" onclick="openTab(event, 'week1')">W1</button>
            <button class="tab" onclick="openTab(event, 'week2')">W2</button>
            <button class="tab" onclick="openTab(event, 'week3')">W3</button>
            <button class="tab" onclick="openTab(event, 'week4')">W4</button>
        </div>
    </div>

    <div class="main-container">
        <div id="globalSearchContainer" class="search-outer hidden">
            <input type="text" id="mainSearch" class="search-input-pill" placeholder="🔍 Search customers..." oninput="renderMasterTable()">
        </div>

        <div id="admin" class="tab-content active">
            <div id="setup-form-wrapper">
                <div class="card">
                    <h3 class="section-title">New Customer</h3>
                    <input type="hidden" id="editId">
                    <div class="input-stack force-stack">
                        <input type="text" id="cName" placeholder="Full Name">
                        <input type="text" id="cAddr" placeholder="Address">
                        <input type="text" id="cPostcode" placeholder="Postcode">
                        <input type="tel" id="cPhone" placeholder="Mobile Number">
                        <input type="number" id="cPrice" placeholder="Price £">
                    </div>
                    <div class="grid-1x2">
                        <select id="cWeek" class="large-select">
                            <option value="1">Week 1</option><option value="2">Week 2</option>
                            <option value="3">Week 3</option><option value="4">Week 4</option>
                        </select>
                        <select id="cDay" class="large-select">
                            <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                        </select>
                    </div>
                    <textarea id="cNotes" placeholder="Notes..." class="premium-textarea"></textarea>
                    <button class="btn-main full-width-btn" onclick="saveCustomer()">💾 Save Customer</button>
                </div>

                <div class="card action-card-green">
                    <button class="btn-clear full-width-btn" onclick="completeCycle()">🚀 START NEW MONTH</button>
                </div>

                <div class="card">
                    <h3 class="section-title">Database</h3>
                    <div class="grid-1x2">
                        <button class="btn-export-blue full-width-btn" onclick="exportFullCSV()">💾 Export</button>
                        <button class="btn-import-yellow full-width-btn" onclick="document.getElementById('csvFile').click()">📂 Import</button>
                    </div>
                    <input type="file" id="csvFile" style="display:none;" onchange="importFullCSV(event)">
                </div>

                <div class="card action-card-red">
                    <button class="btn-clear full-width-btn" onclick="runUATClear()">🗑️ RESET ALL DATA</button>
                </div>
            </div>
            <div class="version-tag">v11.8 - Action Hub Build</div>
        </div>

        <div id="master" class="tab-content">
            <div id="masterTableBody"></div>
        </div>

        <div id="stats" class="tab-content">
            <div class="card">
                <h3 class="section-title" id="statsMonthTitle">Monthly Summary</h3>
                <div class="stat-row"><span>Income:</span> <strong id="currRevenue">£0.00</strong></div>
                <div class="stat-row"><span>Expenses:</span> <strong id="currSpend">£0.00</strong></div>
                <div class="stat-row"><span>New Debt:</span> <strong id="currDebt" style="color:var(--danger)">£0.00</strong></div>
                <hr>
                <div class="stat-row"><span>Net Position:</span> <strong id="currProfit" style="color:var(--success)">£0.00</strong></div>
            </div>
            <div id="monthlyHistoryContainer"></div>
        </div>

        <div id="spend" class="tab-content">
            <div class="card">
                <h3 class="section-title">Log Expense</h3>
                <div class="force-stack">
                    <input type="text" id="expDesc" placeholder="Description" class="large-select" style="margin-bottom:10px;">
                    <input type="number" id="expAmt" placeholder="Amount £" class="large-select" style="margin-bottom:10px;">
                </div>
                <button class="btn-main full-width-btn" onclick="addExpense()">Add Expense</button>
            </div>
            <div id="expenseList"></div>
        </div>

        <div id="week1" class="tab-content"></div>
        <div id="week2" class="tab-content"></div>
        <div id="week3" class="tab-content"></div>
        <div id="week4" class="tab-content"></div>
    </div>

    <div id="custModal" class="modal-overlay" onclick="if(event.target === this) closeCustModal()">
        <div class="modal-content">
            <button class="close-btn" onclick="closeCustModal()">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js?v=118"></script>
</body>
</html>
