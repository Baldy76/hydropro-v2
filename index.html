<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v16.5</title>
    <link rel="stylesheet" href="styles.css?v=165">
</head>
<body class="light-mode">

    <div class="app-header" id="globalHeader">
        <img src="Logo.png" class="logo-img" id="mainLogo" alt="Logo">
        <div class="mode-switch-wrapper">
            <label class="ios-switch">
                <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="main-container">
        
        <div id="home" class="tab-content active">
            <div class="home-hero">
                <div id="greetingMsg" class="home-greeting">Good Morning</div>
                <div id="headerDate" class="home-date"></div>
            </div>

            <div class="home-grid">
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('admin')"><span>✨</span><small>Setup</small></button>
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('master')"><span>👥</span><small>Custs</small></button>
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('stats')"><span>📊</span><small>Stats</small></button>
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('spend')"><span>💸</span><small>Ledger</small></button>
                
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week1')"><span>1</span><small>Week 1</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week2')"><span>2</span><small>Week 2</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week3')"><span>3</span><small>Week 3</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week4')"><span>4</span><small>Week 4</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week5')"><span>5</span><small>Week 5</small></button>
            </div>
        </div>

        <div id="subpageNav" class="subpage-nav hidden">
            <button class="back-pill bounce-on-tap" onclick="openTab('home')">🏠 Back to Home</button>
        </div>

        <div id="admin" class="tab-content">
            <div class="card ios-form-card">
                <h3 class="section-title">Add Client</h3>
                <input type="hidden" id="editId">
                <div class="input-group"><label class="ios-label">Name</label><input type="text" id="cName" class="ios-input"></div>
                <div class="input-group"><label class="ios-label">House No.</label><input type="text" id="cHouseNum" class="ios-input"></div>
                <div class="input-group"><label class="ios-label">Street</label><input type="text" id="cStreet" class="ios-input"></div>
                <div class="input-group"><label class="ios-label">Postcode</label><input type="text" id="cPostcode" class="ios-input"></div>
                <div class="input-group"><label class="ios-label">Price £</label><input type="number" id="cPrice" class="ios-input"></div>
                <div class="grid-1x2">
                    <div class="input-group"><label class="ios-label">Week</label><select id="cWeek" class="ios-select"><option value="1">W1</option><option value="2">W2</option><option value="3">W3</option><option value="4">W4</option><option value="5">W5</option></select></div>
                    <div class="input-group"><label class="ios-label">Day</label><select id="cDay" class="ios-select"><option value="Monday">Mon</option><option value="Tuesday">Tue</option><option value="Wednesday">Wed</option><option value="Thursday">Thu</option><option value="Friday">Fri</option></select></div>
                </div>
                <button class="btn-main full-width-btn bounce-on-tap" onclick="saveCustomer()">💾 Save Customer</button>
            </div>
        </div>

        <div id="master" class="tab-content"><div id="masterTableBody"></div></div>
        <div id="stats" class="tab-content"><div class="dashboard-hero"><div id="currProfit" class="hero-amount">£0.00</div></div></div>
        <div id="spend" class="tab-content"><div id="expenseList"></div></div>
        <div id="week1" class="tab-content"></div><div id="week2" class="tab-content"></div><div id="week3" class="tab-content"></div><div id="week4" class="tab-content"></div><div id="week5" class="tab-content"></div>
    </div>

    <div class="page-version-footer">v16.5 - Hub Architecture</div>
    <script src="app.js?v=165"></script>
</body>
</html>
