<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v26.7</title>
    <link rel="stylesheet" href="styles.css?v=267">
</head>
<body class="light-mode">

    <header id="global-header-shield">
        <div class="header-top-row">
            <div class="logo-area"><img src="Logo.png" class="oblong-logo" alt="Logo"></div>
            <button id="themeToggleBtn" class="header-theme-btn" onclick="toggleDarkMode()">🌙</button>
        </div>
        <div class="greeting-area-centered">
            <span id="greetText">GOOD MORNING, PARTNER! ☕</span>
            <span id="dateText"></span>
        </div>
    </header>

    <div class="main-viewport-container">
        <section id="fence-home" class="tab-content active">
            <div class="home-grid-lockdown">
                <button class="lock-tile" onclick="openTab('fence-setup')"><span>✨</span><small>Setup</small></button>
                <button class="lock-tile" onclick="openTab('fence-master')"><span>👥</span><small>Custs</small></button>
                <button class="lock-tile" onclick="openTab('fence-stats')"><span>📊</span><small>Stats</small></button>
                <button class="lock-tile" onclick="openTab('fence-ledger')"><span>💸</span><small>Ledger</small></button>
                <button class="lock-tile tile-full" onclick="openTab('fence-weeks-hub')"><span>📅</span><small>Weekly Work</small></button>
            </div>
        </section>

        <section id="fence-weeks-hub" class="tab-content">
            <button class="back-home-pill-top" onclick="openTab('fence-home')">🏠 Back to Home</button>
            <div class="weeks-grid-lock">
                <button class="tile-week-select" onclick="openWeek(1)">Week 1</button>
                <button class="tile-week-select" onclick="openWeek(2)">Week 2</button>
                <button class="tile-week-select" onclick="openWeek(3)">Week 3</button>
                <button class="tile-week-select" onclick="openWeek(4)">Week 4</button>
                <button class="tile-week-select tile-full" onclick="openWeek(5)">Week 5</button>
            </div>
        </section>

        <section id="fence-week-view" class="tab-content">
            <button class="back-home-pill-top" onclick="openTab('fence-weeks-hub')">⬅️ Back to Hub</button>
            <div id="bulk-action-bar"></div>
            <div id="week-list-container" class="iron-list-stack"></div>
        </section>

        <section id="fence-master" class="tab-content"></section>
        <section id="fence-setup" class="tab-content"></section>
        <section id="fence-ledger" class="tab-content"></section>
        <section id="fence-stats" class="tab-content"></section>
    </div>

    <div id="msgModal" class="modal-overlay hidden" onclick="closeMsgModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Send Invoice? 💳</h3>
            <p id="msgPreview" style="font-size:14px; opacity:0.7; margin-bottom:20px;"></p>
            <div class="modal-grid-3">
                <button class="btn-wa" style="height:60px; border-radius:15px; color:white; border:none; font-weight:900;" id="sendWA">WhatsApp</button>
                <button class="btn-sms" style="height:60px; border-radius:15px; color:white; border:none; font-weight:900;" id="sendSMS">SMS</button>
                <button style="height:60px; border-radius:15px; background:#8e8e93; color:white; border:none; font-weight:900;" onclick="closeMsgModal()">Skip</button>
            </div>
        </div>
    </div>

    <footer id="footer-version">v26.7 - Smart Messaging Release</footer>
    <script src="app.js?v=267"></script>
</body>
</html>
