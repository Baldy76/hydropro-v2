<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v16.3</title>
    <link rel="stylesheet" href="styles.css?v=163">
</head>
<body class="light-mode">

    <div class="app-header">
        <img src="Logo.png" class="logo-img" alt="Hydro Pro">
        <div class="mode-switch-wrapper">
            <label class="ios-switch">
                <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="main-container">
        
        <div id="home" class="tab-content active">
            <div class="home-hero">
                <div id="greetingMsg" class="home-greeting">Good Morning</div>
                <div id="headerDate" class="home-date">Monday, 23 March</div>
                <div id="weatherWrap" class="home-weather hidden" onclick="openWeatherApp()">
                    <span id="wIcon"></span> <span id="wTemp">--°C</span>
                </div>
            </div>

            <div class="home-grid">
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('admin')"><span>✨</span><small>Setup</small></button>
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('master')"><span>👥</span><small>Custs</small></button>
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('plan')"><span>🛰️</span><small>Plan</small></button>
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('stats')"><span>📊</span><small>Stats</small></button>
                <button class="tile tile-admin bounce-on-tap" onclick="openTab('spend')"><span>💸</span><small>Ledger</small></button>
                
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week1')"><span>📅</span><small>W 1</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week2')"><span>📅</span><small>W 2</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week3')"><span>📅</span><small>W 3</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week4')"><span>📅</span><small>W 4</small></button>
                <button class="tile tile-week bounce-on-tap" onclick="openTab('week5')"><span>📅</span><small>W 5</small></button>
            </div>
        </div>

        <div id="subpageNav" class="subpage-nav hidden">
            <button class="back-pill bounce-on-tap" onclick="openTab('home')">🏠 Back to Home</button>
        </div>

        <div id="admin" class="tab-content">
            <div class="card">
                <h3 class="section-title">Add Client</h3>
                <input type="hidden" id="editId">
                <div class="input-stack force-stack">
                    <input type="text" id="cName" placeholder="Name">
                    <input type="text" id="cAddr" placeholder="Address">
                    <input type="tel" id="cPhone" placeholder="Mobile">
                    <input type="number" id="cPrice" placeholder="Price £">
                </div>
                <div class="grid-1x2">
                    <select id="cWeek" class="large-select"><option value="1">Week 1</option><option value="2">Week 2</option><option value="3">Week 3</option><option value="4">Week 4</option><option value="5">Week 5</option></select>
                    <select id="cDay" class="large-select"><option value="Monday">Monday</option><option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option><option value="Friday">Friday</option></select>
                </div>
                <button class="btn-main full-width-btn bounce-on-tap" onclick="saveCustomer()">💾 Save</button>
            </div>
            <div class="card action-card-green"><button class="btn-clear full-width-btn" onclick="completeCycle()">🚀 START NEW MONTH</button></div>
        </div>

        <div id="master" class="tab-content"><div id="masterTableBody"></div></div>
        <div id="plan" class="tab-content"><div class="card"><h3>Planner/Broadcaster</h3><p>Optimizers and Routing Tools</p></div></div>
        <div id="stats" class="tab-content"><div class="dashboard-hero"><div class="hero-label">Net Profit</div><div class="hero-amount" id="currProfit">£0.00</div></div></div>
        <div id="spend" class="tab-content"><div id="expenseList"></div></div>
        <div id="week1" class="tab-content"></div><div id="week2" class="tab-content"></div><div id="week3" class="tab-content"></div><div id="week4" class="tab-content"></div><div id="week5" class="tab-content"></div>
    </div>

    <div id="globalModal" class="modal-overlay" onclick="if(event.target === this) closeModal()"><div class="modal-content"><button class="close-btn" onclick="closeModal()">✕</button><div id="modalContentBody"></div></div></div>
    <script src="app.js?v=163"></script>
</body>
</html>
