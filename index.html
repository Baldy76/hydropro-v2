<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v13.6</title>
    <link rel="stylesheet" href="styles.css?v=136">
</head>
<body class="light-mode">

    <div class="sticky-header" id="mainHeader">
        <div class="header-top">
            <img src="Logo.png" class="logo-img" alt="Hydro Pro Logo">
            <div class="mode-switch-wrapper">
                <label class="ios-switch">
                    <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div class="date-container">
            <div id="greetingMsg" class="greeting-txt">Hello, Jonathan!</div>
            <div id="headerDate" class="date-txt"></div>
        </div>
    </div>

    <div class="main-container">
        
        <div id="home" class="tab-content active">
            <div class="home-grid">
                <button class="tile tile-main" onclick="openTab('admin')"><span>✨</span><small>Setup</small></button>
                <button class="tile tile-main" onclick="openTab('master')"><span>👥</span><small>Customers</small></button>
                <button class="tile tile-main" onclick="openTab('stats')"><span>📊</span><small>Statistics</small></button>
                <button class="tile tile-main" onclick="openTab('spend')"><span>💸</span><small>Ledger</small></button>
                <button class="tile tile-weeks-hub" onclick="openTab('weeksHub')"><span>📅</span><small>Weeks</small></button>
            </div>
        </div>

        <div id="weeksHub" class="tab-content">
            <button class="back-pill" onclick="openTab('home')">🏠 Back to Home</button>
            <div class="home-grid">
                <button class="tile tile-week" onclick="openTab('week1')"><span>1</span><small>Week 1</small></button>
                <button class="tile tile-week" onclick="openTab('week2')"><span>2</span><small>Week 2</small></button>
                <button class="tile tile-week" onclick="openTab('week3')"><span>3</span><small>Week 3</small></button>
                <button class="tile tile-week" onclick="openTab('week4')"><span>4</span><small>Week 4</small></button>
                <button class="tile tile-week" onclick="openTab('week5')"><span>5</span><small>Week 5</small></button>
            </div>
        </div>

        <div id="globalNav" class="tab-content" style="display:none;">
            <button class="back-pill" onclick="handleBackNavigation()">🏠 Back to Home</button>
        </div>

        <div id="admin" class="tab-content">
            <div class="card">
                <h3 class="section-title">✨ Add New Client</h3>
                <input type="hidden" id="editId">
                <div class="input-stack force-stack">
                    <input type="text" id="cName" placeholder="Full Name">
                    <input type="text" id="cAddr" placeholder="Address">
                    <input type="text" id="cPostcode" placeholder="Postcode">
                    <input type="tel" id="cPhone" placeholder="Mobile Number">
                    <input type="number" id="cPrice" placeholder="Price £">
                </div>
                <div class="grid-1x2">
                    <select id="cWeek" class="large-select">
                        <option value="1">Week 1</option><option value="2">Week 2</option>
                        <option value="3">Week 3</option><option value="4">Week 4</option>
                        <option value="5">Week 5</option>
                    </select>
                    <select id="cDay" class="large-select">
                        <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                    </select>
                </div>
                <textarea id="cNotes" placeholder="Notes..." class="premium-textarea"></textarea>
                <button class="btn-main full-width-btn" onclick="saveCustomer()">💾 Save Customer</button>
            </div>
            <div class="card action-card-green"><button class="btn-clear full-width-btn" onclick="completeCycle()">🚀 START NEW MONTH</button></div>
        </div>

        <div id="master" class="tab-content">
            <div class="card" style="padding:10px; background:transparent; box-shadow:none;">
                <input type="text" id="mainSearch" class="search-input-pill" placeholder="🔍 Search customers..." oninput="renderMasterTable()">
            </div>
            <div id="masterTableBody"></div>
        </div>

        <div id="stats" class="tab-content">
            <div class="dashboard-hero">
                <div class="hero-label" id="statsMonthTitle">Summary</div>
                <div class="hero-amount" id="currProfit">£0.00</div>
            </div>
            <div id="monthlyHistoryContainer"></div>
        </div>

        <div id="spend" class="tab-content">
            <div class="card">
                <h3 class="section-title">💸 Log Expense</h3>
                <div class="force-stack">
                    <input type="text" id="expDesc" placeholder="Description" class="large-select" style="margin-bottom:10px;">
                    <input type="number" id="expAmt" placeholder="Amount £" class="large-select">
                </div>
                <button class="btn-main full-width-btn" onclick="addExpense()" style="margin-top:10px;">Add Expense</button>
            </div>
            <div id="expenseList"></div>
        </div>

        <div id="week1" class="tab-content"></div><div id="week2" class="tab-content"></div><div id="week3" class="tab-content"></div><div id="week4" class="tab-content"></div><div id="week5" class="tab-content"></div>
    </div>

    <div class="page-version-footer">v13.6 - Production</div>

    <script src="app.js?v=136"></script>
</body>
</html>
