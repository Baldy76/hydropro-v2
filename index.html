<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v14.8</title>
    <link rel="stylesheet" href="styles.css?v=148">
</head>
<body class="light-mode">

    <div class="sticky-header">
        <div class="header-top">
            <img src="Logo-Light.png" id="appLogo" class="logo-img" alt="Hydro Pro Logo">
            <div class="mode-switch-wrapper">
                <label class="ios-switch">
                    <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div class="date-container">
            <div id="greetingMsg" class="greeting-txt">Hey there!</div>
            <div id="weatherWrap" class="weather-pill hidden bounce-on-tap" onclick="openWeatherApp()">
                <span id="wIcon"></span> <span id="wTemp">--°C</span>
            </div>
            <div id="headerDate" class="date-txt"></div>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="openTab(event, 'admin')">Set up</button>
            <button class="tab" onclick="openTab(event, 'plan')">Plan</button>
            <button class="tab" onclick="openTab(event, 'master')">Custs</button>
            <button class="tab" onclick="openTab(event, 'stats')">Stats</button>
            <button class="tab" onclick="openTab(event, 'spend')">Ledger</button>
            <button class="tab" onclick="openTab(event, 'week1')">W1</button>
            <button class="tab" onclick="openTab(event, 'week2')">W2</button>
            <button class="tab" onclick="openTab(event, 'week3')">W3</button>
            <button class="tab" onclick="openTab(event, 'week4')">W4</button>
            <button class="tab" onclick="openTab(event, 'week5')">W5</button>
        </div>
    </div>

    <div class="main-container">
        <div id="globalSearchContainer" class="search-outer hidden">
            <input type="text" id="mainSearch" class="search-input-pill" placeholder="🔍 Find a customer..." oninput="renderMasterTable()">
        </div>

        <div id="admin" class="tab-content active">
            <div id="setup-form-wrapper">
                <div class="card">
                    <h3 class="section-title">✨ Add New Client</h3>
                    <input type="hidden" id="editId">
                    <div class="input-stack force-stack">
                        <input type="text" id="cName" placeholder="Full Name">
                        <input type="text" id="cAddr" placeholder="Address">
                        <input type="text" id="cPostcode" placeholder="Postcode">
                        <input type="tel" id="cPhone" placeholder="Mobile Number">
                        <input type="number" id="cPrice" placeholder="Price £">
                    </div>
                    <div class="grid-1x2">
                        <select id="cWeek" class="large-select">
                            <option value="1">Week 1</option><option value="2">Week 2</option>
                            <option value="3">Week 3</option><option value="4">Week 4</option>
                            <option value="5">Week 5</option>
                        </select>
                        <select id="cDay" class="large-select">
                            <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                        </select>
                    </div>
                    <textarea id="cNotes" placeholder="Notes..." class="premium-textarea"></textarea>
                    <button class="btn-main full-width-btn bounce-on-tap" onclick="saveCustomer()">💾 Save Customer</button>
                </div>
                <div class="card action-card-green"><button class="btn-clear full-width-btn" onclick="completeCycle()">🚀 START NEW MONTH</button></div>
                <div class="card">
                    <h3 class="section-title">📦 Database</h3>
                    <div class="grid-1x2">
                        <button id="exportBtn" class="pill-btn bounce-on-tap" onclick="exportFullCSV()">💾 Export</button>
                        <button id="importBtn" class="pill-btn bounce-on-tap" onclick="document.getElementById('csvFile').click()">📂 Import</button>
                    </div>
                    <input type="file" id="csvFile" style="display:none;" onchange="importFullCSV(event)">
                </div>
                <div class="card action-card-red"><button class="btn-clear full-width-btn" onclick="runUATClear()">🗑️ RESET ALL DATA</button></div>
            </div>
        </div>

        <div id="plan" class="tab-content">
            <div class="card">
                <h3 class="section-title">🛰️ Smart Routing</h3>
                <div class="grid-1x2">
                    <select id="planWeekSelect" class="large-select">
                        <option value="1">Week 1</option><option value="2">Week 2</option>
                        <option value="3">Week 3</option><option value="4">Week 4</option>
                        <option value="5">Week 5</option>
                    </select>
                    <button class="btn-main bounce-on-tap" style="margin-top:0;" onclick="optimizeDay(document.getElementById('planWeekSelect').value)">🚀 Sort Route</button>
                </div>
                <button class="btn-main full-width-btn bounce-on-tap" style="background:var(--success); margin-top:10px;" onclick="mapTheDay(document.getElementById('planWeekSelect').value)">🗺️ Open Multi-Stop Map</button>
            </div>
            <div class="card">
                <h3 class="section-title">📢 Weekly Broadcaster</h3>
                <div class="grid-1x2">
                    <button class="btn-main bounce-on-tap" style="margin-top:0; background:#25D366" onclick="broadcastWeek(document.getElementById('planWeekSelect').value, 'wa')">💬 WhatsApp All</button>
                    <button class="btn-main bounce-on-tap" style="margin-top:0; background:var(--accent)" onclick="broadcastWeek(document.getElementById('planWeekSelect').value, 'sms')">📱 SMS All</button>
                </div>
            </div>
        </div>

        <div id="master" class="tab-content"><div id="masterTableBody"></div></div>

        <div id="stats" class="tab-content">
            <div class="dashboard-hero">
                <div class="hero-label" id="statsMonthTitle">Summary</div>
                <div class="hero-amount" id="currProfit">£0.00</div>
                <div class="hero-subtext">💰 Total Profit in Pocket</div>
            </div>
            <div class="grid-1x2" style="margin-top:15px;">
                <div class="card mini-card clickable-stat bounce-on-tap" onclick="showIncomeModal()"><div class="mini-card-content"><small>Revenue 🔍</small><strong id="currRevenue" style="color:var(--success)">£0.00</strong></div></div>
                <div class="card mini-card clickable-stat bounce-on-tap" onclick="showExpenseModal()"><div class="mini-card-content"><small>Spend 🔍</small><strong id="currSpend" style="color:var(--danger)">£0.00</strong></div></div>
            </div>
            <div class="card debt-highlight-card clickable-stat bounce-on-tap" onclick="showArrearsModal()">
                <div class="stat-row"><span>Arrears 🔍</span><strong id="totalOldDebt">£0.00</strong></div>
            </div>
            <div id="monthlyHistoryContainer"></div>
        </div>

        <div id="spend" class="tab-content">
            <div class="card">
                <h3 class="section-title">💸 Log Expense</h3>
                <div class="force-stack"><input type="text" id="expDesc" placeholder="Description" class="large-select"><input type="number" id="expAmt" placeholder="Amount £" class="large-select"></div>
                <button class="btn-main full-width-btn bounce-on-tap" onclick="addExpense()">Add Expense</button>
            </div>
            <div id="expenseList"></div>
        </div>

        <div id="week1" class="tab-content"></div><div id="week2" class="tab-content"></div><div id="week3" class="tab-content"></div><div id="week4" class="tab-content"></div><div id="week5" class="tab-content"></div>
    </div>

    <div class="global-footer">v14.8 - Restored & Navy Polished</div>

    <div id="globalModal" class="modal-overlay" onclick="if(event.target === this) closeModal()">
        <div class="modal-content"><button class="close-btn" onclick="closeModal()">✕</button><div id="modalContentBody"></div></div>
    </div>

    <script src="app.js?v=148"></script>
</body>
</html>
