<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v44.2</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="styles.css?v=442">
</head>
<body class="light-mode">

    <header id="G-HEADER">
        <div class="G-LOGO-WRAP"><img src="Logo.png" id="mainLogo" alt="HydroPro"></div>
        <div class="CENTRAL-STATUS-POD">
            <div id="weather-pill" class="G-WEATHER-PILL" onclick="launchWeatherApp()">
                <span id="w-icon">🌤️</span><small id="w-text">SYNC...</small>
            </div>
            <div class="G-SWITCH-WRAP">
                <span class="MODE-LABEL">LIT</span>
                <label class="ios-switch">
                    <input type="checkbox" id="themeCheckbox">
                    <span class="ios-slider"></span>
                </label>
                <span class="MODE-LABEL">DRK</span>
            </div>
        </div>
        <div class="DATE-CONTAINER"><span id="dateText"></span></div>
    </header>

    <main id="G-VIEWPORT">
        <section id="home-root" class="tab-content active">
            <div class="IRON-HUB-CONTAINER">
                <div class="IRON-ROW">
                    <button class="IRON-BTN" onclick="openTab('admin-root')"><span class="I-LOCKED">⚙️</span><small class="T-LOCKED">Admin</small></button>
                    <button class="IRON-BTN" onclick="openTab('master-root')"><span class="I-LOCKED">👥</span><small class="T-LOCKED">Custs</small></button>
                </div>
                <div class="IRON-ROW">
                    <button class="IRON-BTN" onclick="openTab('finances-root')"><span class="I-LOCKED">💰</span><small class="T-LOCKED">Finances</small></button>
                    <button class="IRON-BTN" onclick="openTab('weeks-root')"><span class="I-LOCKED">📅</span><small class="T-LOCKED">Weeks</small></button>
                </div>
            </div>
            <div class="SYNC-AREA">
                <button class="SYNC-BTN-IRON" onclick="location.reload(true)">🔄 SYNC UPDATES</button>
            </div>
        </section>

        <section id="admin-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="VAULT-CARD">
                <h3 class="VAULT-HDR">Add New Customer</h3>
                <div class="VAULT-ROW"><span>👤</span><input type="text" id="cName" placeholder="Name"></div>
                <div class="VAULT-ROW"><span>🏠</span><input type="text" id="cHouseNum" placeholder="No."></div>
                <div class="VAULT-ROW"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street"></div>
                <div class="VAULT-ROW"><span>💰</span><input type="number" id="cPrice" placeholder="Price £"></div>
                <textarea id="cNotes" class="VAULT-NOTES-IRON" placeholder="Job notes..."></textarea>
                <button class="VAULT-SAVE-BTN" onclick="saveCustomer()">✨ SAVE CUSTOMER</button>
            </div>
            <div class="VAULT-CARD">
                <h3 class="VAULT-HDR">Business Bank Details</h3>
                <div class="VAULT-ROW"><span>🏦</span><input type="text" id="bName" placeholder="Account Name"></div>
                <div class="VAULT-ROW"><span>💳</span><input type="text" id="bAcc" placeholder="Acc Number"></div>
                <button class="VAULT-SAVE-BTN" style="background:var(--accent);" onclick="saveBank()">🔒 SECURE BANK INFO</button>
            </div>
            <div class="ADMIN-VAULT">
                <button class="ADMIN-BTN-BLUE" onclick="exportToQuickBooks()">📊 QUICKBOOKS EXPORT</button>
                <div class="ADMIN-ROW">
                    <button class="ADMIN-BTN-GREY" onclick="exportData()">📤 Backup</button>
                    <button class="ADMIN-BTN-GREY" onclick="document.getElementById('importFile').click()">📥 Restore</button>
                    <input type="file" id="importFile" hidden onchange="importData(event)" accept=".csv">
                </div>
                <button class="ADMIN-BTN-BLUE" style="background:var(--success); margin-top:15px;" onclick="completeCycle()">🚀 START NEW MONTH</button>
                <button class="ADMIN-BTN-RED" onclick="nuclearReset()">☢️ FACTORY RESET</button>
            </div>
        </section>

        <section id="master-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="SEARCH-VAULT-IRON">
                <input type="text" id="mainSearch" placeholder="🔍 Search Name or Street..." oninput="renderMaster()">
            </div>
            <div id="master-list-container"></div>
        </section>

        <section id="finances-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div id="finances-dashboard-container"></div>
            <div id="finances-statement-container"></div>
        </section>

        <section id="weeks-root" class="tab-content">
            <button class="FIXED-BACK-BTN" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="IRON-HUB-CONTAINER">
                <div class="IRON-ROW">
                    <button class="IRON-BTN" onclick="viewWeek(1)"><span class="I-LOCKED">1</span><small class="T-LOCKED">Week 1</small></button>
                    <button class="IRON-BTN" onclick="viewWeek(2)"><span class="I-LOCKED">2</span><small class="T-LOCKED">Week 2</small></button>
                </div>
                <div class="IRON-ROW">
                    <button class="IRON-BTN" onclick="viewWeek(3)"><span class="I-LOCKED">3</span><small class="T-LOCKED">Week 3</small></button>
                    <button class="IRON-BTN" onclick="viewWeek(4)"><span class="I-LOCKED">4</span><small class="T-LOCKED">Week 4</small></button>
                </div>
                <div class="IRON-ROW">
                    <button class="IRON-BTN FULL-W" onclick="viewWeek(5)"><span class="I-LOCKED">5</span><small class="T-LOCKED">Week 5</small></button>
                </div>
            </div>
        </section>

        <section id="week-view-root" class="tab-content">
            <div class="NAV-VAULT">
                <button class="NAV-BTN-LOCKED" onclick="openTab('weeks-root')">⬅️ Back</button>
                <button class="NAV-BTN-LOCKED" onclick="openTab('home-root')">🏠 Hub</button>
            </div>
            <div class="DAY-LOCKED-BAR">
                <button class="D-BTN-LOCKED active" onclick="setWorkingDay('Mon', this)">M</button>
                <button class="D-BTN-LOCKED" onclick="setWorkingDay('Tue', this)">T</button>
                <button class="D-BTN-LOCKED" onclick="setWorkingDay('Wed', this)">W</button>
                <button class="D-BTN-LOCKED" onclick="setWorkingDay('Thu', this)">T</button>
                <button class="D-BTN-LOCKED" onclick="setWorkingDay('Fri', this)">F</button>
                <button class="D-BTN-LOCKED" onclick="setWorkingDay('Sat', this)">S</button>
                <button class="D-BTN-LOCKED" onclick="setWorkingDay('Sun', this)">S</button>
            </div>
            <div id="week-list-container"></div>
        </section>
    </main>

    <footer id="G-FOOTER">v44.2 TOTAL RESTORATION</footer>
    <script src="app.js?v=442"></script>
</body>
</html>
