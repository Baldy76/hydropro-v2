<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v46.1</title>
    <link rel="stylesheet" href="styles.css?v=461">
</head>
<body class="light-mode">

    <header id="G-HEADER">
        <div class="G-LOGO-WRAP"><img src="Logo.png" id="mainLogo" alt="HydroPro"></div>
        <div class="CENTRAL-STATUS-POD">
            <div id="weather-pill" class="G-WEATHER-PILL" onclick="launchWeatherApp()">
                <span id="w-icon">🌤️</span><small id="w-text">SYNC...</small>
            </div>
            <div class="G-SWITCH-WRAP">
                <span class="MODE-LABEL">LIT</span>
                <label class="ios-switch">
                    <input type="checkbox" id="themeCheckbox">
                    <span class="ios-slider"></span>
                </label>
                <span class="MODE-LABEL">DRK</span>
            </div>
        </div>
        <div class="DATE-CONTAINER"><span id="dateText"></span></div>
    </header>

    <main id="G-VIEWPORT">
        <section id="home-root" class="tab-content active">
            <div class="HUB-grid-container">
                <div class="HUB-row">
                    <button class="HUB-btn" onclick="openTab('admin-root')"><span class="HUB-icon">⚙️</span><small class="HUB-label">Admin</small></button>
                    <button class="HUB-btn" onclick="openTab('master-root')"><span class="HUB-icon">👥</span><small class="HUB-label">Custs</small></button>
                </div>
                <div class="HUB-row">
                    <button class="HUB-btn" onclick="openTab('finances-root')"><span class="HUB-icon">💰</span><small class="HUB-label">Finances</small></button>
                    <button class="HUB-btn" onclick="openTab('weeks-root')"><span class="HUB-icon">📅</span><small class="HUB-label">Weeks</small></button>
                </div>
            </div>
            <div class="HUB-sync-area"><button class="HUB-sync-btn" onclick="location.reload(true)">🔄 SYNC UPDATES</button></div>
        </section>

        <section id="finances-root" class="tab-content">
            <button class="FIN-back-btn" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div id="FIN-dashboard-iron"></div>
            <div id="FIN-ledger-iron"></div>
        </section>

        <section id="weeks-root" class="tab-content">
            <button class="WEE-back-btn" onclick="openTab('home-root')">🏠 Home Hub</button>
            <div class="WEE-grid-iron">
                <div class="WEE-row"><button class="WEE-btn" onclick="viewWeek(1)">1</button><button class="WEE-btn" onclick="viewWeek(2)">2</button></div>
                <div class="WEE-row"><button class="WEE-btn" onclick="viewWeek(3)">3</button><button class="WEE-btn" onclick="viewWeek(4)">4</button></div>
                <div class="WEE-row"><button class="WEE-btn full" onclick="viewWeek(5)">5</button></div>
            </div>
        </section>

        <section id="week-view-root" class="tab-content">
            <div class="WEE-nav-bar">
                <button onclick="openTab('weeks-root')">⬅️ BACK</button>
                <button onclick="openTab('home-root')">🏠 HUB</button>
            </div>
            <div class="WEE-day-bar">
                <button class="WEE-day-btn active" onclick="setWorkingDay('Mon', this)">M</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Tue', this)">T</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Wed', this)">W</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Thu', this)">T</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Fri', this)">F</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Sat', this)">S</button>
                <button class="WEE-day-btn" onclick="setWorkingDay('Sun', this)">S</button>
            </div>
            <div id="WEE-list-iron"></div>
        </section>
        
        </main>

    <footer id="G-FOOTER">v46.1 MASTER VARIABLE</footer>
    <script src="app.js?v=461"></script>
</body>
</html>
